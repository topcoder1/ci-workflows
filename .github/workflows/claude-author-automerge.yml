name: Claude-author Auto-merge (reusable)

# Auto-enables `gh pr merge --auto --squash` on PRs authored by Claude
# (detected via branch prefix `claude/*`, `Co-Authored-By: Claude` trailer in
# any PR commit, or the `auto-merge` label), provided the PR is neither:
#
#  1. Classified `blocked` OR `sensitive` by the caller's .github/risk-paths.yml
#     (the `blocked:` / `sensitive:` lists — covers any repo-specific path
#     without us having to keep a parallel regex). This verdict is computed BY
#     THIS WORKFLOW at decision time: it runs the same classify.mjs that
#     pr-classify.yml runs, against the rules file read from the PR's BASE
#     branch. The pr-classify `risk:*` label is still honored as a
#     belt-and-suspenders second signal (covers hand-applied labels), but it
#     is no longer the only carrier — pr-classify labels via GITHUB_TOKEN,
#     whose events never trigger workflows, so label-only gating was a TOCTOU
#     race (see the classifier-verdict step below). Both classes mean manual
#     click-merge: `blocked` is a hard privilege-escalation block, `sensitive`
#     is a high-impact path the caller flags for human review (agent runtime,
#     schema, migrations, etc.) — the reusable's global risk-tier regex
#     (item 2) does NOT know a caller's repo-specific `sensitive:` paths, so
#     the direct risk-paths read is the only way these get gated. `sensitive`
#     is a no-op for callers without a `sensitive:` list.
#
#  2. Touching any risk-tier path category from the global CLAUDE.md policy:
#     - auth / login / signin / signup / logout / session(s) / oauth /
#       oauth2 / sso / jwt / mfa / totp / webauthn / passkey
#     - secret(s) / env files / keychain / credentials
#     - DB migrations / SQL files
#     - billing / payment / pricing / invoice / subscription(s) /
#       checkout / refund(s)
#     - NAF credit/billing gate code (naf.py / naf/ module at any depth —
#       the validate_call/log_successful_call client that decides whether a
#       customer API call is authorized and charged. Lesson 2026-05-28 from
#       whois-api-llc/wxa_webcat#438: a fix to src/webcat/api/middleware/naf.py
#       auto-merged because the path has no auth/billing keyword even though
#       the file IS the billing gate. Matched specifically, not via a broad
#       `middleware/` rule, to avoid over-blocking benign middleware.)
#     - Go service entrypoints (main.go at any depth — wires routes,
#       middleware, secrets loading, DB init; touching it can change
#       auth or transport behavior. Lesson 2026-05-24 from
#       whois-api-llc/wxa-mcp-server#193 + #197 where Claude PRs
#       modifying main.go + internal/oauth2/ auto-merged because the
#       `oauth` alternation didn't catch `oauth2` and main.go had no
#       pattern at all.) OPT-OUT: Go monorepos with many cmd/*/main.go
#       dev tools (not deployed services) can set `risk_main_go: false`
#       — the bare main.go pattern can't tell cmd/<service>/main.go from
#       cmd/<tool>/main.go, so it false-flags every tool. Such callers
#       gate their real deployed entrypoint via .github/risk-paths.yml.
#     - production infra: Dockerfile, docker-compose, .github/workflows,
#       .github/action(s)/ (repo-local composite actions, singular or plural —
#       executed CI code), .github/scripts/ (workflow-invoked scripts — executed
#       CI code), any action.yml|action.yaml at ANY depth (GitHub's reserved
#       action-definition filename, gated by filename like Dockerfile/main.go so
#       actions outside .github/action(s)/ are still caught),
#       .github/dependabot.yml|yaml (dependency-automation config — controls
#       what gets auto-merged and can set insecure-external-code-execution),
#       .github/risk-paths.yml, .github/CODEOWNERS, infra/iam/, infra
#       subdirs (deploy/terraform/pulumi/k8s/cloudformation/ansible/
#       digitalocean/scanner-id/nginx), systemd units + Terraform files
#       anywhere under infra/, top-level terraform/, pulumi/, k8s/,
#       fly.toml, deploy/, deploy*.{sh,yaml}. The non-workflow .github/
#       surfaces are ENUMERATED, not a blanket .github/** — README-ish
#       files (ISSUE_TEMPLATE/, PULL_REQUEST_TEMPLATE.md, FUNDING.yml,
#       actionlint.yml) stay auto-mergeable. Lesson 2026-07-10: six Claude
#       PRs whose only change was .github/dependabot.yml auto-merged because
#       the .github/ globs covered workflows/ but not the sibling
#       automation-config and composite-action/script surfaces.
#     - ML serving/model-promotion: ml/predictor.py (live scoring path),
#       ml/retrain.py (model-promotion gate). Lesson 2026-06-02: a serving-path
#       fix auto-merged because ml/ had no risk glob; now explicitly matched.
#
#       Specifically NOT risky under infra/: cron schedule files
#       (infra/crontabs/*.crontab), runbook .md files, example configs.
#       The earlier broad `^infra/.*` rule over-classified cron-only
#       changes (lesson 2026-05-04, wxa_vpn#250) and was narrowed
#       2026-05-20.
#
# Customer-copy diffs (legal / marketing / pricing wording) are NOT
# detected by the global regex here — repo layouts differ (techrecon:
# site/src/**; wxa-astro: src/content/** Tina JSON), so a central glob
# would over-block some repos and miss others. The enforcement for this
# policy category is the caller's .github/risk-paths.yml `sensitive:`
# list (item 1 above): marketing-site repos MUST list their
# wording-bearing trees there. Lesson 2026-07-02 from
# whois-api-llc/techrecon#405: a marketing-copy PR auto-merge-armed
# because techrecon's sensitive: list had no site/ entries; fixed in
# techrecon#410 + wxa-astro#63. Claude Review still reviews copy
# semantically, but it is not the merge gate for this category.
#
# This workflow does NOT bypass branch protection. It only enables GitHub's
# "auto-merge" toggle, which still waits for required checks (Claude Review)
# to pass and required reviews to land before merging.

on:
  workflow_call:
    inputs:
      merge_method:
        description: "Merge method: merge | squash | rebase"
        required: false
        type: string
        default: "squash"
      override_label:
        description: "Label that forces auto-merge regardless of detection (default 'auto-merge')."
        required: false
        type: string
        default: "auto-merge"
      risk_bypass_label:
        description: "Label that bypasses the risk-tier path check on Claude-authored PRs (Option A). Apply from the PR list with one click instead of click-merging through the PR detail page."
        required: false
        type: string
        default: "auto-merge-approved"
      hold_label:
        description: "Label that durably refuses auto-merge on a Claude-authored PR and revokes it if already armed. Outranks the override/bypass labels and the Codex bypass. To lift the hold: remove the label, then re-enable manually if desired (label removal does not re-trigger this workflow). Set empty to disable."
        required: false
        type: string
        default: "manual-merge"
      codex_check_name:
        description: "Status-check name for Codex Review. When this check is SUCCESS on a Claude-authored PR, the risk-tier check is bypassed (Option B). Set empty to disable Codex-trusted bypass."
        required: false
        type: string
        default: "review / Codex Review"
      risk_main_go:
        description: "Treat ANY main.go change as risk-tier (manual merge). Default true. Set false in Go monorepos where most cmd/*/main.go are dev tools rather than the deployed service — the bare main.go pattern can't tell cmd/<service>/main.go from cmd/<tool>/main.go. When false, gate the real service entrypoint via the caller's .github/risk-paths.yml instead."
        required: false
        type: boolean
        default: true
    secrets:
      automerge_pat:
        description: >-
          Optional fine-grained PAT (or GitHub App token) used to enable
          auto-merge. When set, the resulting merge commit is attributed
          to the PAT user and triggers downstream push-on-main workflows
          (e.g. deploy). When unset, the workflow falls back to the
          built-in GITHUB_TOKEN — auto-merge still works, but the merge
          is attributed to app/github-actions and GitHub silently
          suppresses downstream workflow runs (the GITHUB_TOKEN
          loop-prevention rule). Verified on topcoder1/wxa_webcat#201
          (2026-05-04). Required scopes for a fine-grained PAT - repo
          contents r/w, pull-requests r/w. Wire via `secrets: inherit`
          in the caller, or pass explicitly. See the README for setup.
        required: false

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: write
      pull-requests: write
      # NOTE: Option B (Codex-trusted bypass) queries the check-runs API,
      # which requires `checks: read`. We do NOT request it here at the
      # reusable's job level because that would cap-mismatch with the 44+
      # existing fleet callers that grant only contents+pull-requests at
      # the workflow level — startup_failure on every existing caller's
      # next Claude PR (caught on whois-api-llc/wxa-mcp-server#80, run
      # 25292746179, before broad rollout).
      #
      # Callers that want Option B working should add `checks: read` to
      # THEIR workflow-level permissions block. The Codex bypass step
      # below already handles missing permission gracefully (returns
      # bypass=0 with no crash via `gh api ... || echo '{}'` + jq `try`),
      # so callers without `checks: read` simply never bypass via Codex —
      # the label bypass (Option A) and the original "no risky paths"
      # path still work.
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect Claude authorship
        id: detect
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          OVERRIDE_LABEL: ${{ inputs.override_label }}
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          claude=0
          reason=""

          # 1. Branch prefix
          case "$BRANCH" in
            claude/*) claude=1; reason="branch=$BRANCH";;
          esac

          # 2. Co-Authored-By trailer in any PR commit
          if [ "$claude" -eq 0 ]; then
            if git log --format=%B "$BASE_SHA..$HEAD_SHA" | grep -qiE '^Co-Authored-By:\s*Claude'; then
              claude=1
              reason="trailer"
            fi
          fi

          # 3. Override label
          if [ "$claude" -eq 0 ]; then
            if echo "$LABELS_JSON" | jq -e --arg L "$OVERRIDE_LABEL" '.[] | select(.name == $L)' >/dev/null 2>&1; then
              claude=1
              reason="label=$OVERRIDE_LABEL"
            fi
          fi

          echo "claude_authored=$claude" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "Detection: claude_authored=$claude reason=$reason"

      # Classifier verdict, computed race-free at decision time.
      #
      # HISTORY — why this step no longer trusts the label alone.
      # pr-classify and this workflow both fire on the same pull_request
      # event. The old design read the live risk:* labels and documented
      # this mitigation: "the caller wires `labeled` into trigger types,
      # so once the classifier applies the label this workflow re-runs
      # and the revoke step disables any auto-merge enabled on the first
      # pass." That re-run is structurally unreachable: pr-classify
      # labels with GITHUB_TOKEN, and GITHUB_TOKEN-attributed events
      # NEVER trigger workflows (GitHub's recursion prevention). So when
      # this workflow won the race, nothing revoked the arm. Evidence,
      # whois-api-llc/wxa-secrets#27 (2026-07-17 UTC): both workflows
      # fired on ready_for_review at 00:40:37; this one read live labels
      # at 00:40:43 (none yet), armed at 00:40:46; pr-classify applied
      # risk:blocked at 00:40:50 — 4s late — and the PR merged at
      # 00:42:30 when required checks went green. Every repo-specific
      # blocked:/sensitive: path not covered by the global regex below
      # had this race.
      #
      # FIX — compute the verdict ourselves, synchronously:
      #
      #  1. Belt-and-suspenders: honor a live risk:blocked/risk:sensitive
      #     label if one already landed (covers hand-applied labels; a
      #     label can only ADD gating here, never remove it).
      #  2. Authoritative: read .github/risk-paths.yml from the PR's
      #     BASE branch — NOT the PR head, so a PR cannot edit its own
      #     risk file to escape — and classify the PR's changed files
      #     with the same classify.mjs pr-classify fetches (both pull it
      #     from topcoder1/ci-workflows@default-branch: one matcher,
      #     zero glob-semantics drift). blocked/sensitive ⇒ refuse.
      #
      # Fail-closed rules: risk-paths.yml unreadable for any reason other
      # than a definitive 404 ⇒ fail the run (auto-merge never armed);
      # classify.mjs guard/parse errors ⇒ fail; changed-file listing
      # truncated at the REST 3000-file cap ⇒ fail. A 404 means the repo
      # carries no repo-specific policy — the global risk-tier regex
      # below still gates, which matches pre-classifier behavior. No
      # `checks: read` is needed for any of this (deliberate: e.g. the
      # wxa-secrets caller omits it to keep the Codex bypass disabled).
      - name: Setup Node (risk-paths classification)
        if: steps.detect.outputs.claude_authored == '1'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check classifier verdict
        id: classifier_verdict
        if: steps.detect.outputs.claude_authored == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          retry() { local i out; for i in 1 2 3; do if out=$("$@"); then printf '%s' "$out"; return 0; fi; [ "$i" -lt 3 ] && sleep $((i * 5)); done; return 1; }
          blocked=0
          verdict_label=""
          verdict_source=""

          # Signal 1 (belt-and-suspenders): a risk:* label that already
          # landed. Query the API, not the event payload — labels in the
          # event snapshot are frozen at event time. A failed read
          # degrades to "no label": Signal 2 below is the authoritative
          # gate and fails closed on its own errors.
          labels=$(gh api "/repos/${GITHUB_REPOSITORY}/issues/$PR/labels" \
            --jq '.[].name' 2>/dev/null || echo "")
          if echo "$labels" | grep -qx 'risk:blocked'; then
            blocked=1; verdict_label="risk:blocked"; verdict_source="label"
          elif echo "$labels" | grep -qx 'risk:sensitive'; then
            blocked=1; verdict_label="risk:sensitive"; verdict_source="label"
          fi

          # Signal 2 (authoritative, race-free): classify the changed
          # files ourselves against the BASE branch's risk-paths.yml.
          if [ "$blocked" -eq 0 ]; then
            # Base-branch rules file. A 404 is definitive (no repo-specific
            # policy → the global regex step still gates); anything else
            # retries, then FAILS CLOSED — never arm auto-merge under an
            # unreadable policy.
            rp_state=""
            rp_b64=""
            for i in 1 2 3; do
              rp_err=$(mktemp)
              if rp_b64=$(gh api -X GET \
                    "repos/${GITHUB_REPOSITORY}/contents/.github/risk-paths.yml" \
                    -f ref="$BASE_REF" --jq '.content' 2>"$rp_err"); then
                rp_state="present"; rm -f "$rp_err"; break
              fi
              if grep -q 'HTTP 404' "$rp_err"; then
                rp_state="absent"; rm -f "$rp_err"; break
              fi
              cat "$rp_err" >&2; rm -f "$rp_err"
              [ "$i" -lt 3 ] && sleep $((i * 5))
            done
            if [ -z "$rp_state" ]; then
              echo "::error::could not read .github/risk-paths.yml@${BASE_REF} after 3 attempts — refusing to arm auto-merge (fail closed). Re-run when the API recovers, or merge manually."
              exit 1
            fi

            if [ "$rp_state" = "present" ]; then
              # Changed-file names via the paginated files API (same call
              # and same 3000-file fail-closed cap as pr-classify.yml).
              changed=$(retry gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}/files?per_page=100" \
                --paginate --jq '.[].filename') || {
                echo "::error::could not list PR changed files after 3 attempts — refusing to arm auto-merge (fail closed)."
                exit 1
              }
              if [ "$(printf '%s\n' "$changed" | sed '/^$/d' | wc -l)" -ge 3000 ]; then
                echo "::error::PR changes 3000+ files — file listing is truncated, cannot classify. Merge manually."
                exit 1
              fi

              # Same classifier pr-classify.yml runs, fetched from the same
              # place, run in a scratch dir so the PR checkout's own (head)
              # risk-paths.yml is never consulted. classify.mjs failures
              # (bracket/negation guards, YAML parse) exit nonzero ⇒ this
              # step fails ⇒ fail closed, identical to pr-classify staying
              # red on the same repo.
              work=$(mktemp -d)
              mkdir -p "$work/repo/.github"
              printf '%s' "$rp_b64" | base64 -d > "$work/repo/.github/risk-paths.yml"
              fetch_mjs() {
                gh api "repos/topcoder1/ci-workflows/contents/.github/scripts/classify.mjs" \
                  --jq '.content'
              }
              retry fetch_mjs | base64 -d > "$work/classify.mjs"
              (cd "$work" && npm install --no-save --silent yaml@2 minimatch@10 >/dev/null)
              class=$(cd "$work/repo" && printf '%s\n' "$changed" | node "$work/classify.mjs")
              echo "risk-paths.yml@${BASE_REF} verdict: $class"
              case "$class" in
                blocked|sensitive)
                  blocked=1; verdict_label="risk:$class"; verdict_source="risk-paths"
                  ;;
              esac
            else
              echo "No .github/risk-paths.yml on ${BASE_REF} — no repo-specific policy; the global risk-tier regex still applies."
            fi
          fi

          {
            echo "blocked=$blocked"
            echo "verdict_label=$verdict_label"
            echo "verdict_source=$verdict_source"
          } >> "$GITHUB_OUTPUT"
          if [ "$blocked" -eq 1 ]; then
            case "$verdict_source" in
              label) why="labeled $verdict_label by pr-classify" ;;
              *) why="classified $verdict_label against risk-paths.yml@${BASE_REF}" ;;
            esac
            echo "::warning::PR $why — auto-merge refused (manual click-merge required; no label or status-check bypass applies)"
          fi

      # Revoke auto-merge if a previous run of this workflow enabled it
      # before this gate could see the verdict (armed before the direct
      # risk-paths read existed, base risk policy expanded since, or a
      # risk label hand-applied later). Idempotent — `gh pr
      # merge --disable-auto` returns non-zero when auto-merge wasn't
      # on; we tolerate that with `|| true` and verify state via the
      # follow-up gh pr view.
      - name: Revoke auto-merge if classifier blocked
        if: |
          steps.detect.outputs.claude_authored == '1' &&
          steps.classifier_verdict.outputs.blocked == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh pr merge --disable-auto "$PR_URL" 2>&1 || true
          state=$(gh pr view "$PR_URL" --json autoMergeRequest \
            --jq 'if .autoMergeRequest == null then "OFF" else "ON" end')
          echo "Auto-merge state after revoke: $state"
          if [ "$state" = "ON" ]; then
            echo "::error::auto-merge still ON after --disable-auto — investigate"
            exit 1
          fi

      # Durable manual hold (lesson 2026-07-02, whois-api-llc/techrecon#405):
      # a human ran `gh pr merge --disable-auto` (timeline 17:16:40Z) and an
      # in-flight run of this workflow re-armed auto-merge 11 seconds later
      # (17:16:51Z); the PR then merged with no human click. `--disable-auto`
      # is the documented escape hatch in the fleet policy, so it must
      # survive workflow re-runs. Two hold signals, checked at enable time:
      #
      #  1. hold_label (default 'manual-merge') — explicit one-click hold
      #     from the PR list page; also revokes an already-armed auto-merge
      #     (next step). Outranks Option A/B bypasses and the override
      #     label: contradictory signals resolve to manual.
      #  2. Timeline — a HUMAN turned auto-merge OFF after it was last on:
      #     do not re-arm. Two subtleties this logic must get right, both
      #     found by adversarial review of the first cut of this step:
      #
      #     (a) Chronology, not lexicography. We take the MAX created_at
      #         among auto-merge events and, on a same-second tie, resolve
      #         toward "disabled" (fail-safe). The earlier cut sorted the
      #         string "<ts> <event>" and let the event NAME break ties —
      #         and `auto_merge_disabled` sorts before every enable event
      #         (auto_merge_enabled / auto_squash_enabled /
      #         auto_rebase_enabled: 'd' < 'e'/'m'/'r'/'s'), so a human
      #         disable colliding in the same wall-clock second as an
      #         in-flight re-arm was silently dropped and auto-merge
      #         re-armed against the human — the exact #405 defeat this step
      #         exists to prevent. GitHub timeline created_at is
      #         whole-second precision, so same-second collisions are real.
      #
      #     (b) Actor: exclude OUR OWN revokes. The classifier-revoke and
      #         hold-label-revoke steps also emit auto_merge_disabled, via
      #         GITHUB_TOKEN, so they show actor `github-actions[bot]`.
      #         A human `gh pr merge --disable-auto` shows the human's login
      #         (verified live: #405 disable = "topcoder1"; fleet
      #         classifier-revokes = "github-actions[bot]"). If we treated a
      #         bot revoke as a durable hold, a PR that was armed→revoked on
      #         the arm-before-classify race and later de-risked (sensitive
      #         path removed → reclassified non-blocked) would be stranded
      #         forever even though no human ever disabled it. So Signal 2
      #         holds only on a HUMAN disable (actor != github-actions[bot]).
      #         Note: actor cannot distinguish enable-from-disable (both the
      #         PAT user), which is why chronology+event-type carries that;
      #         actor is used ONLY to filter self-revokes out of disables.
      #
      #     To resume auto-merge after a human disable, re-enable manually
      #     (`gh pr merge --auto --<method>`) — labels do NOT clear a
      #     timeline hold.
      #
      # Both reads go through the issues API namespace the classifier-verdict
      # step already uses in production, and both degrade gracefully
      # (unreadable → that signal reports no hold) so this can never crash
      # the run or strand a PR.
      - name: Check manual hold
        id: hold
        if: |
          steps.detect.outputs.claude_authored == '1' &&
          steps.classifier_verdict.outputs.blocked != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          HOLD_LABEL: ${{ inputs.hold_label }}
        run: |
          set -euo pipefail
          hold=0
          reason=""

          # Signal 1: hold label. Query live labels, not the event snapshot —
          # the label may have been applied after the triggering event fired.
          if [ -n "$HOLD_LABEL" ]; then
            labels=$(gh api "/repos/${{ github.repository }}/issues/$PR/labels" \
              --jq '.[].name' 2>/dev/null || echo "")
            if echo "$labels" | grep -qxF "$HOLD_LABEL"; then
              hold=1
              reason="label:$HOLD_LABEL"
            fi
          fi

          # Signal 2: the chronologically-last auto-merge state event is a
          # HUMAN disable. jq does all the ordering (no shell sort of a mixed
          # "<ts> <event>" key): filter to auto-merge state events, find the
          # max created_at, and among events at that max timestamp, hold iff
          # any is a disable NOT emitted by github-actions[bot] (i.e. a human
          # --disable-auto, not our own classifier/hold revoke). Ties resolve
          # toward the human disable — fail-safe. See the step's header
          # comment for why (a) chronology and (b) actor both matter.
          if [ "$hold" -eq 0 ]; then
            human_disable=$(
              (gh api "/repos/${{ github.repository }}/issues/$PR/timeline" \
                 --paginate 2>/dev/null || echo '[]') \
              | jq -r 'try (
                  [ .[] | select(.event == "auto_merge_disabled"
                        or .event == "auto_merge_enabled"
                        or .event == "auto_squash_enabled"
                        or .event == "auto_rebase_enabled") ]
                  | (map(.created_at) | max) as $t
                  | if $t == null then "no"
                    elif any(.[]; .created_at == $t
                          and .event == "auto_merge_disabled"
                          and ((.actor.login // "") != "github-actions[bot]"))
                    then "yes" else "no" end
                ) // "no"'
            )
            if [ "$human_disable" = "yes" ]; then
              hold=1
              reason="timeline:human-disable-newest"
            fi
          fi

          echo "hold=$hold" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          if [ "$hold" -eq 1 ]; then
            echo "::notice::Manual hold respected ($reason) — auto-merge will not be (re-)enabled. Re-enable manually to lift a timeline hold; remove the '$HOLD_LABEL' label to lift a label hold."
          else
            echo "No manual hold detected."
          fi

      # A label hold also revokes an auto-merge that was armed before the
      # label landed (same idempotent pattern as the classifier revoke).
      # Timeline holds need no revoke — by definition auto-merge is already
      # off when the newest event is a disable.
      - name: Revoke auto-merge on hold label
        if: |
          steps.detect.outputs.claude_authored == '1' &&
          steps.classifier_verdict.outputs.blocked != '1' &&
          startsWith(steps.hold.outputs.reason, 'label:')
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh pr merge --disable-auto "$PR_URL" 2>&1 || true
          state=$(gh pr view "$PR_URL" --json autoMergeRequest \
            --jq 'if .autoMergeRequest == null then "OFF" else "ON" end')
          echo "Auto-merge state after hold-label revoke: $state"
          if [ "$state" = "ON" ]; then
            echo "::error::auto-merge still ON after --disable-auto — investigate"
            exit 1
          fi

      # Option A: explicit human approval via label.
      # Run BEFORE the risk-tier path-scan so a PR the scan can't
      # classify can still bypass-merge. Historically that meant any
      # >20k-line diff: the scan fetched names via `gh pr diff`, which
      # HTTP-406s past 20k lines (topcoder1/attaxion_dev#71, 2026-05-04,
      # 261k-line data drop, died before consulting this label — hence
      # the ordering). The scan now lists names via the paginated files
      # API (dotclaude#121, 2026-07-02), so diff size no longer kills it;
      # the remaining can't-run case is the REST 3000-file listing cap,
      # where the scan fails closed.
      #
      # When a Claude PR matches the risk-tier classifier (or the
      # path-scan can't run), you can apply the `auto-merge-approved`
      # label from the PR list page (one click, no PR detail navigation)
      # to bypass the risk gate. Confirms "yes I read it, auto-merge it"
      # without requiring the actual click-merge round-trip.
      - name: Check risk bypass label (Option A)
        id: bypass_label
        if: |
          steps.detect.outputs.claude_authored == '1' &&
          steps.classifier_verdict.outputs.blocked != '1'
        env:
          BYPASS_LABEL: ${{ inputs.risk_bypass_label }}
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          if [ -z "$BYPASS_LABEL" ]; then
            echo "bypass=0" >> "$GITHUB_OUTPUT"
            echo "Bypass label disabled (input empty)."
            exit 0
          fi
          if echo "$LABELS_JSON" | jq -e --arg L "$BYPASS_LABEL" '.[] | select(.name == $L)' >/dev/null 2>&1; then
            echo "bypass=1" >> "$GITHUB_OUTPUT"
            echo "Bypass label '$BYPASS_LABEL' present — risk-tier gate overridden (path-scan will be skipped)."
          else
            echo "bypass=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Check risk-tier paths
        id: risk
        if: |
          steps.detect.outputs.claude_authored == '1' &&
          steps.classifier_verdict.outputs.blocked != '1' &&
          steps.bypass_label.outputs.bypass != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          RISK_MAIN_GO: ${{ inputs.risk_main_go }}
          BYPASS_LABEL: ${{ inputs.risk_bypass_label }}
        run: |
          set -euo pipefail
          # Changed-file names via the paginated files API — `gh pr diff
          # --name-only` HTTP-406s on diffs >20k lines (dotclaude#121).
          # The listing endpoint caps at 3000 files; past that the scan
          # can't see every path, so fail closed (the bypass label above
          # stays the human override).
          changed=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}/files?per_page=100" \
            --paginate --jq '.[].filename')
          if [ "$(printf '%s\n' "$changed" | sed '/^$/d' | wc -l)" -ge 3000 ]; then
            echo "::error::PR changes 3000+ files — file listing is truncated and the risk scan cannot classify every path. Apply the '${BYPASS_LABEL:-auto-merge-approved}' label or merge manually."
            exit 1
          fi
          # Risk-tier glob patterns (kept in sync with global CLAUDE.md policy).
          # If you add a category, also update install-automerge-policy.sh and
          # the CLAUDE.md policy block.
          patterns='^(.*/)?(auth|login|signin|signup|logout|session[s]?|oauth|oauth2|sso|jwt|mfa|totp|webauthn|passkey)(/|\.(py|go|ts|tsx|js|jsx)$|$)
          ^(.*/)?secret[s]?(/|\.(py|go|ts|tsx|js|jsx)$|$)
          ^(.*/)?\.env($|\..*)
          ^(.*/)?keychain.*
          ^(.*/)?credentials.*
          ^(.*/)?migrations(/|$)
          .*\.sql$
          ^(.*/)?(billing|payment[s]?|pricing|invoice[s]?|subscription[s]?|checkout|refund[s]?)(/|\.(py|go|ts|tsx|js|jsx)$|$)
          (^|/)naf(/|\.(py|go|ts|js)$)
          (^|/)main\.go$
          (^|/)Dockerfile(\..*)?$
          ^docker-compose.*\.ya?ml$
          (^|/)docker/docker-compose.*\.ya?ml$
          ^\.github/workflows/.*
          ^templates/ci-workflows/.*
          ^\.github/actions?/.*
          ^\.github/scripts/.*
          (^|/)action\.ya?ml$
          ^\.github/dependabot\.ya?ml$
          ^\.github/risk-paths\.yml$
          ^\.github/CODEOWNERS$
          ^infra/iam/.*
          ^infra/(deploy|terraform|pulumi|k8s|cloudformation|ansible|digitalocean|scanner-id)/.*
          ^infra/nginx.*
          ^infra/.*\.(service|slice|timer|tf|hcl|sh)$
          ^terraform/.*
          ^pulumi/.*
          ^k8s/.*
          ^fly\.toml$
          ^deploy/.*
          (^|/)deploy.*\.(sh|ya?ml)$
          (^|/)ml/predictor\.(py|go|ts|js)$
          (^|/)ml/retrain\.(py|go|ts|js)$'

          # main.go opt-out: in Go monorepos most cmd/*/main.go are dev tools,
          # not the deployed service, and the bare (^|/)main\.go$ pattern can't
          # distinguish them. When risk_main_go=false, drop the main.go pattern
          # so tool entrypoints auto-merge; the caller gates its real service
          # entrypoint via .github/risk-paths.yml instead. Default true keeps
          # the fleet-wide behavior unchanged.
          if [ "${RISK_MAIN_GO:-true}" != "true" ]; then
            patterns="$(printf '%s\n' "$patterns" | grep -vF 'main\.go')"
          fi

          matched=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            while IFS= read -r p; do
              p="${p#"${p%%[![:space:]]*}"}"
              [ -z "$p" ] && continue
              if echo "$f" | grep -Eq "$p"; then
                matched="$matched$f (matched: $p)\n"
                break
              fi
            done <<< "$patterns"
          done <<< "$changed"

          if [ -n "$matched" ]; then
            {
              echo "risky=1"
              echo "matched<<EOF"
              printf "%b" "$matched"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Risk-tier match — auto-merge blocked:"
            printf "%b" "$matched"
          else
            echo "risky=0" >> "$GITHUB_OUTPUT"
            echo "No risk-tier paths matched."
          fi

      # Option B: Codex review trust.
      # When the configured Codex status check is SUCCESS, treat the PR as
      # second-model-reviewed and bypass the risk-tier gate. The check name
      # is configurable so callers can wire whatever Codex caller they
      # use (default "review / Codex Review", which matches the
      # pr-codex-review.yml caller in this same repo).
      - name: Check Codex Review status (Option B)
        id: bypass_codex
        if: steps.detect.outputs.claude_authored == '1' && steps.risk.outputs.risky == '1' && steps.bypass_label.outputs.bypass != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CHECK_NAME: ${{ inputs.codex_check_name }}
        run: |
          set -euo pipefail
          if [ -z "$CHECK_NAME" ]; then
            echo "bypass=0" >> "$GITHUB_OUTPUT"
            echo "Codex bypass disabled (codex_check_name input empty)."
            exit 0
          fi
          # Look at the head SHA's check-runs and the PR's status checks. Codex
          # callers commonly post as a check-run; some post as a commit status.
          # Match either. We require an explicit SUCCESS — neutral / pending /
          # failure all leave the risk gate in place.
          #
          # Pipe through `jq --arg` instead of `gh api --jq` with shell-
          # interpolated quotes. If CHECK_NAME ever contains a double-quote
          # (custom callers, future variants), inline interpolation would
          # produce a broken jq filter that silently returns nothing —
          # bypass=0, no warning. `--arg` binds the variable safely
          # regardless of contents. Caught by Claude Review on PR #25.
          #
          # Wrap each gh-api call in `|| echo '{}'` and run jq with a guard
          # so the step never crashes the workflow. Failure modes that
          # return invalid JSON: 403 from missing `checks: read` (caught
          # on wxa-mcp-server#80 install run), 404 on commits that haven't
          # propagated yet, network blips. In all cases we want bypass=0,
          # never a workflow crash. Caller's main path ("post the blocked
          # comment") still runs.
          codex_state=$(
            (gh api "/repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" 2>/dev/null \
              || echo '{"check_runs":[]}') \
            | jq -r --arg name "$CHECK_NAME" \
              'try (.check_runs[] | select(.name == $name) | .conclusion) // empty' \
            | head -1
          )
          if [ -z "$codex_state" ]; then
            codex_state=$(
              (gh api "/repos/${{ github.repository }}/commits/$HEAD_SHA/status" 2>/dev/null \
                || echo '{"statuses":[]}') \
              | jq -r --arg name "$CHECK_NAME" \
                'try (.statuses[] | select(.context == $name) | .state) // empty' \
              | head -1
            )
          fi
          echo "Codex check '$CHECK_NAME' state: '${codex_state:-<absent>}'"
          if [ "$codex_state" = "success" ] || [ "$codex_state" = "SUCCESS" ]; then
            echo "bypass=1" >> "$GITHUB_OUTPUT"
            echo "Codex Review passed — risk-tier gate overridden."
          else
            echo "bypass=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        if: |
          steps.detect.outputs.claude_authored == '1' &&
          steps.classifier_verdict.outputs.blocked != '1' &&
          steps.hold.outputs.hold != '1' && (
            steps.risk.outputs.risky != '1' ||
            steps.bypass_label.outputs.bypass == '1' ||
            steps.bypass_codex.outputs.bypass == '1'
          )
        env:
          # Prefer the caller-supplied PAT so the merge commit triggers
          # downstream `push:` workflows (deploy, CI). Fall back to the
          # workflow-issued GITHUB_TOKEN when no PAT is wired — auto-merge
          # still works but downstream workflows are silenced. See the
          # `automerge_pat` secret docstring above for the full rationale.
          GH_TOKEN: ${{ secrets.automerge_pat || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          METHOD: ${{ inputs.merge_method }}
          REASON: ${{ steps.detect.outputs.reason }}
          RISKY: ${{ steps.risk.outputs.risky }}
          BYPASS_LABEL: ${{ steps.bypass_label.outputs.bypass }}
          BYPASS_CODEX: ${{ steps.bypass_codex.outputs.bypass }}
          USING_PAT: ${{ secrets.automerge_pat != '' && '1' || '0' }}
        run: |
          set -euo pipefail
          if [ "$BYPASS_LABEL" = "1" ]; then
            echo "Enabling auto-merge ($METHOD) — detection: $REASON; risk bypassed via approval label"
          elif [ "$BYPASS_CODEX" = "1" ]; then
            echo "Enabling auto-merge ($METHOD) — detection: $REASON; risk bypassed via Codex pass"
          else
            echo "Enabling auto-merge ($METHOD) — detection: $REASON"
          fi
          if [ "$USING_PAT" = "1" ]; then
            echo "Auth: caller-supplied automerge_pat — downstream workflows WILL trigger on merge."
          else
            echo "::warning::Auth: GITHUB_TOKEN fallback — downstream push workflows (e.g. deploy) will be SILENCED on merge. Wire secrets.automerge_pat in the caller to fix."
          fi
          gh pr merge --auto --"$METHOD" "$PR_URL"

      # Sticky comment when classifier marked the PR risk:blocked. Distinct
      # from the regex-based comment below — classifier-blocked has no
      # bypass mechanism (it's a hard policy block), so the message
      # shouldn't dangle bypass options the user can't actually use.
      - name: Comment when classifier-blocked
        if: |
          steps.detect.outputs.claude_authored == '1' &&
          steps.classifier_verdict.outputs.blocked == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.classifier_verdict.outputs.verdict_label }}
          VERDICT_SOURCE: ${{ steps.classifier_verdict.outputs.verdict_source }}
        run: |
          set -euo pipefail
          marker="<!-- claude-author-automerge:classifier-blocked -->"
          existing=$(gh api "/repos/${{ github.repository }}/issues/$PR/comments" \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -1)
          {
            echo "$marker"
            if [ "$VERDICT_SOURCE" = "risk-paths" ]; then
              echo "**Auto-merge refused — \`${VERDICT:-risk:blocked}\`: changed files match the base branch's \`.github/risk-paths.yml\` (evaluated directly by the auto-merge gate — no label round-trip).**"
            else
              echo "**Auto-merge refused — \`${VERDICT:-risk:blocked}\` label set by pr-classify.**"
            fi
            echo ""
            if [ "$VERDICT" = "risk:sensitive" ]; then
              echo "This PR touches a path in \`.github/risk-paths.yml\`'s \`sensitive:\` list"
              echo "(e.g. agent runtime, schema, migrations). Per the risk taxonomy,"
              echo "sensitive-class PRs are reviewed (Claude + Adversarial + Codex) and then"
              echo "**human click-merged** — auto-merge does not apply. The reusable's global"
              echo "risk-tier regex can't see a caller's repo-specific \`sensitive:\` paths, so"
              echo "the \`risk:sensitive\` verdict (computed from the base branch's risk file,"
              echo "with the pr-classify label as a second signal) is what gates these."
              echo ""
              echo "If this is misclassified, edit the caller repo's \`.github/risk-paths.yml\`."
            else
              echo "This PR touches a path category in \`.github/risk-paths.yml\`'s \`blocked:\`"
              echo "list (workflows, classifier config, CODEOWNERS, secrets, infra). Per the"
              echo "global CLAUDE.md policy, blocked-class PRs require admin click-merge — no"
              echo "label or status-check bypass applies."
              echo ""
              echo "If this is misclassified, edit the caller repo's \`.github/risk-paths.yml\`."
            fi
          } > /tmp/automerge-blocked.md
          if [ -n "$existing" ]; then
            gh api -X PATCH "/repos/${{ github.repository }}/issues/comments/$existing" \
              -f body="$(cat /tmp/automerge-blocked.md)" >/dev/null
          else
            gh pr comment "$PR" --body-file /tmp/automerge-blocked.md
          fi

      - name: Comment + skip when risky
        if: |
          steps.detect.outputs.claude_authored == '1' &&
          steps.classifier_verdict.outputs.blocked != '1' &&
          steps.hold.outputs.hold != '1' &&
          steps.risk.outputs.risky == '1' &&
          steps.bypass_label.outputs.bypass != '1' && steps.bypass_codex.outputs.bypass != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          MATCHED: ${{ steps.risk.outputs.matched }}
          BYPASS_LABEL: ${{ inputs.risk_bypass_label }}
          CODEX_CHECK: ${{ inputs.codex_check_name }}
        run: |
          set -euo pipefail
          marker="<!-- claude-author-automerge:risk-tier -->"
          existing=$(gh api "/repos/${{ github.repository }}/issues/$PR/comments" \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -1)
          {
            echo "$marker"
            echo "**Auto-merge blocked — risk-tier paths touched.**"
            echo ""
            echo "This Claude-authored PR modifies files matching the risk-tier patterns"
            echo "defined in the global CLAUDE.md policy (auth / secrets / migrations /"
            echo "billing / production infra). Manual click-merge required, OR use one of"
            echo "the bypass paths below."
            echo ""
            echo "Matched files:"
            echo '```'
            printf "%b" "$MATCHED"
            echo '```'
            echo ""
            echo "**Bypass options (no PR detail navigation needed):**"
            echo ""
            if [ -n "$BYPASS_LABEL" ]; then
              echo "- Apply the \`$BYPASS_LABEL\` label to this PR. The workflow will re-run on"
              echo "  the label event and enable auto-merge. One click from the PR list page."
            fi
            if [ -n "$CODEX_CHECK" ]; then
              echo "- Wait for the \`$CODEX_CHECK\` status check to pass. If Codex Review is"
              echo "  installed on this repo and it returns SUCCESS, the workflow auto-bypasses"
              echo "  the risk gate on its next run (e.g. on push of a fixup commit)."
            fi
            echo ""
            echo "If a path is misclassified, fix the regex in"
            echo "\`topcoder1/ci-workflows/.github/workflows/claude-author-automerge.yml\`."
          } > /tmp/automerge-comment.md
          if [ -n "$existing" ]; then
            gh api -X PATCH "/repos/${{ github.repository }}/issues/comments/$existing" \
              -f body="$(cat /tmp/automerge-comment.md)" >/dev/null
          else
            gh pr comment "$PR" --body-file /tmp/automerge-comment.md
          fi
