name: Lint

# Two roles for this workflow:
#
# 1. Self-test: triggers on pull_request + push to main of *this repo* so that
#    typos in the reusable workflows here get caught before they break every
#    downstream consumer.
#
# 2. Reusable: other repos can call it via
#       jobs:
#         lint:
#           uses: topcoder1/ci-workflows/.github/workflows/lint.yml@main
#    See callers/lint.yml in the templates dir for a copy-paste-ready caller.
#
# What it checks:
#   - actionlint on every .github/workflows/*.yml (catches GHA-specific bugs)
#   - prettier --check on the markdown glob (default **/*.md)
#   - shellcheck on standalone shell scripts (opt-in, default OFF)
#
# Defaults chosen for "drop into an existing repo without breaking it":
#   - actionlint runs WITHOUT shellcheck. Shellcheck integration in actionlint
#     defaults to severity=info, which surfaces stylistic suggestions
#     (SC2086 "double quote variables", SC2034 "unused variable", etc.) on
#     every existing `run:` block in the target repo. New repos rarely need
#     to fix all of those before they can ship a single PR. Set
#     `run_shellcheck: true` to opt in once the repo is normalized.
#   - prettier auto-installs the target repo's deps if a package.json exists,
#     so prettier plugins (prettier-plugin-svelte etc.) resolve correctly.
#     Skip with `install_node_deps: false` for plain markdown-only repos.
#   - shellcheck on .sh files is OFF by default for the same reason as
#     actionlint's shellcheck: most repos have pre-existing style/info
#     drift. When opted in, defaults to severity=error so only real bugs
#     fail the check; tighten with `shellcheck_severity: warning` etc.

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      markdown_glob:
        description: "Glob passed to prettier --check. Default '**/*.md'."
        required: false
        type: string
        default: "**/*.md"
      run_actionlint:
        description: "Run actionlint job. Default true."
        required: false
        type: boolean
        default: true
      run_prettier:
        description: "Run prettier --check on markdown. Default true."
        required: false
        type: boolean
        default: true
      run_shellcheck:
        description: "Enable actionlint's shellcheck integration. Default false to avoid info-level style noise on first install."
        required: false
        type: boolean
        default: false
      install_node_deps:
        description: "Run `npm ci` before prettier so plugins (prettier-plugin-svelte etc.) resolve. Default true. Skipped automatically when no package.json present."
        required: false
        type: boolean
        default: true
      run_shellcheck_scripts:
        description: "Run shellcheck on standalone .sh / .bash files and shebang-shell scripts in the repo. Default false (opt-in)."
        required: false
        type: boolean
        default: false
      shellcheck_severity:
        description: "Minimum severity to fail on: error | warning | info | style. Default 'error' so only real bugs fail; bump to 'warning' once style/info drift is normalized."
        required: false
        type: string
        default: "error"
      shellcheck_paths:
        description: "Space-separated list of paths to scan, relative to repo root. Default '.' (recurse from root). Override to narrow, e.g. 'scripts bin'."
        required: false
        type: string
        default: "."
      prettier_changed_only:
        description: "On pull_request events, run prettier --check only on files in the diff (intersected with markdown_glob). On push events, always scan the full glob to catch drift. Default true. Set false to scan the full glob on every event."
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    # Skip-logic gotcha: GHA's `==` does loose-numeric coercion, so
    # `false == null` evaluates TRUE (both coerce to 0). That defeats
    # the obvious "null OR truthy" check. We instead stringify via format()
    # and compare against the literal 'false' — null stringifies to '',
    # so the only path to skipping is an explicit `run_actionlint: false`
    # from the caller. github.event_name is also unhelpful here: in a
    # reusable, it returns the caller's event (e.g. 'pull_request'), not
    # 'workflow_call'.
    if: ${{ format('{0}', inputs.run_actionlint) != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        # `-shellcheck=` (empty) disables the shellcheck integration. We
        # default to off because info-level shellcheck warnings (SC2086
        # etc.) are noise on most repos and would block the install PR
        # until every existing `run:` block is normalized. Caller opts in
        # with `run_shellcheck: true`. Use string comparison via format()
        # to dodge GHA's loose-numeric-coercion equality gotcha.
        run: |
          if [ "${{ format('{0}', inputs.run_shellcheck) }}" = "true" ]; then
            ${{ steps.get_actionlint.outputs.executable }} -color
          else
            ${{ steps.get_actionlint.outputs.executable }} -color -shellcheck=
          fi
        shell: bash

  prettier:
    name: prettier (markdown)
    if: ${{ format('{0}', inputs.run_prettier) != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to compute the PR diff against the base ref. Shallow
          # clone (depth=1, the default) lacks the merge-base. fetch-depth=0
          # is heavy but reliable; for very large repos, switch to a
          # `git fetch origin <base-ref> --depth=N` strategy in a follow-up.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # `actions/setup-node` looks for the lock file at the repo root unless
          # `cache-dependency-path` is provided. `**/package-lock.json` matches
          # subdir lock files (e.g. `frontend/package-lock.json`) and would
          # cause setup-node to fail with "Dependencies lock file is not found"
          # when the root has no lock. Restrict to root files only.
          cache: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json', 'yarn.lock') != '' && 'npm' || '' }}

      # If the target repo has a prettier config that references plugins
      # (e.g. prettier-plugin-svelte), prettier needs the project's
      # node_modules to resolve them. Run `npm ci` (preferred, exact lockfile)
      # or fall back to `npm install` if no lockfile.
      - name: Install target repo's deps (for prettier plugins)
        if: ${{ format('{0}', inputs.install_node_deps) != 'false' && hashFiles('**/package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts --no-audit --no-fund
          else
            npm install --ignore-scripts --no-audit --no-fund
          fi
        shell: bash

      - name: Compute file list for prettier
        id: files
        # Two modes:
        #   1. pull_request + prettier_changed_only=true (default):
        #      diff against base ref → intersect with markdown_glob → check
        #      only those files. Keeps PR feedback fast and prevents one
        #      stale file on main from poisoning every subsequent PR.
        #   2. push (always) OR pull_request with prettier_changed_only=false:
        #      check the full markdown_glob. Push-to-main runs catch drift
        #      that PR-mode missed (e.g. a file modified on main directly).
        # Output `files` is a space-separated list, or empty if no matches.
        run: |
          GLOB="${{ inputs.markdown_glob || '**/*.md' }}"
          CHANGED_ONLY="${{ inputs.prettier_changed_only || 'true' }}"
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "pull_request" ] && [ "$CHANGED_ONLY" != "false" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            git fetch --quiet --no-tags origin "$BASE"
            # diff: base merge-base -> HEAD. Filter Added/Modified/Renamed
            # (drop Deleted; prettier --check on a deleted file would error).
            CHANGED=$(git diff --name-only --diff-filter=AMR "origin/$BASE...HEAD")
            # Intersect changed files with the glob using bash extglob+globstar.
            # We also accept the glob without a leading "**/" so that
            # "**/*.md" matches both "foo.md" and "dir/foo.md".
            shopt -s extglob globstar nullglob
            FILTERED=""
            ALT_GLOB="$GLOB"
            if [ "${GLOB#**/}" != "$GLOB" ]; then
              ALT_GLOB="${GLOB#**/}"
            fi
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              # shellcheck disable=SC2053
              if [[ "$f" == $GLOB || "$f" == $ALT_GLOB ]]; then
                FILTERED+="$f"$'\n'
              fi
            done <<< "$CHANGED"
            FILTERED="${FILTERED%$'\n'}"
            if [ -z "$FILTERED" ]; then
              echo "No changed files match glob '$GLOB' — skipping prettier."
              echo "files=" >> "$GITHUB_OUTPUT"
            else
              echo "Will prettier-check $(echo "$FILTERED" | wc -l) changed file(s):"
              echo "$FILTERED"
              # Pass as space-separated; filenames with spaces will break here.
              # If that ever becomes a real issue, switch to a tempfile + xargs.
              {
                echo 'files<<EOF'
                echo "$FILTERED"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Full-glob mode (event=$EVENT, changed_only=$CHANGED_ONLY)."
            echo "files=$GLOB" >> "$GITHUB_OUTPUT"
          fi
        env:
          GLOB: ${{ inputs.markdown_glob || '**/*.md' }}
        shell: bash

      - name: prettier --check
        if: steps.files.outputs.files != ''
        # Use the project's prettier (with its plugins) when node_modules is
        # populated; otherwise fall back to a one-off prettier@3 install.
        # Files come from the previous step — either a single glob string
        # (full-mode) or a newline-separated explicit list (changed-only).
        # Null-delimited xargs is used so filenames with spaces don't split.
        run: |
          set -eo pipefail
          if [ -x node_modules/.bin/prettier ]; then
            PRETTIER=(node_modules/.bin/prettier)
          else
            PRETTIER=(npx --yes prettier@3)
          fi
          if [ "$FILES" = "$GLOB" ]; then
            # Full-glob mode — pass the glob string verbatim; prettier
            # expands it itself.
            "${PRETTIER[@]}" --check "$GLOB"
          else
            # Changed-files mode — newline-delimited explicit list. Convert
            # to NUL-delimited for xargs so filenames with spaces don't split.
            printf '%s\n' "$FILES" | tr '\n' '\0' | xargs -0 "${PRETTIER[@]}" --check
          fi
        env:
          FILES: ${{ steps.files.outputs.files }}
          GLOB: ${{ inputs.markdown_glob || '**/*.md' }}
        shell: bash

  shellcheck:
    name: shellcheck (scripts)
    # Opt-in only — most repos have style/info shellcheck drift on existing
    # scripts that would flood the first install PR. Caller flips
    # `run_shellcheck_scripts: true` when ready to enforce.
    if: ${{ format('{0}', inputs.run_shellcheck_scripts) == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        # Ubuntu runners ship with shellcheck preinstalled, so no install
        # step needed. We collect:
        #   1. Files matching *.sh / *.bash by name
        #   2. Extension-less files whose first line is a shell shebang
        #      (covers bin/* style scripts that are bash but unmarked).
        # Both lists are filtered to caller-provided paths, then deduped
        # before passing to shellcheck. Severity defaults to 'error' so
        # only actual bugs fail; style/info noise stays advisory.
        run: |
          set -euo pipefail
          SEVERITY="${{ inputs.shellcheck_severity || 'error' }}"
          # shellcheck disable=SC2086
          read -r -a PATHS <<< "${{ inputs.shellcheck_paths || '.' }}"

          # 1. Collect *.sh / *.bash files.
          mapfile -t BY_EXT < <(
            find "${PATHS[@]}" -type f \( -name "*.sh" -o -name "*.bash" \) \
              -not -path "*/.git/*" \
              -not -path "*/node_modules/*" \
              -not -path "*/.husky/_/*" \
              2>/dev/null | sort -u
          )

          # 2. Collect extension-less files with a shell shebang.
          mapfile -t BY_SHEBANG < <(
            find "${PATHS[@]}" -type f ! -name "*.*" \
              -not -path "*/.git/*" \
              -not -path "*/node_modules/*" \
              2>/dev/null | while IFS= read -r f; do
                head -c 256 "$f" 2>/dev/null \
                  | head -1 \
                  | grep -qE '^#!.*/(env +)?(ba)?sh\b' \
                  && echo "$f"
              done | sort -u
          )

          ALL=("${BY_EXT[@]}" "${BY_SHEBANG[@]}")
          if [ "${#ALL[@]}" -eq 0 ]; then
            echo "No shell scripts found under: ${PATHS[*]}"
            exit 0
          fi

          # Dedup (in case a *.sh file also matched the shebang scan).
          mapfile -t UNIQUE < <(printf '%s\n' "${ALL[@]}" | sort -u)

          echo "Checking ${#UNIQUE[@]} script(s) at severity=${SEVERITY}:"
          printf '  %s\n' "${UNIQUE[@]}"
          shellcheck -S "$SEVERITY" "${UNIQUE[@]}"
        shell: bash
