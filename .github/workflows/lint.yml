name: Lint

# Two roles for this workflow:
#
# 1. Self-test: triggers on pull_request + push to main of *this repo* so that
#    typos in the reusable workflows here get caught before they break every
#    downstream consumer.
#
# 2. Reusable: other repos can call it via
#       jobs:
#         lint:
#           uses: topcoder1/ci-workflows/.github/workflows/lint.yml@main
#    See callers/lint.yml in the templates dir for a copy-paste-ready caller.
#
# What it checks:
#   - actionlint on every .github/workflows/*.yml (catches GHA-specific bugs)
#   - prettier --check on the markdown glob (default **/*.md)
#   - shellcheck on standalone shell scripts (opt-in, default OFF)
#
# Defaults chosen for "drop into an existing repo without breaking it":
#   - actionlint runs WITHOUT shellcheck. Shellcheck integration in actionlint
#     defaults to severity=info, which surfaces stylistic suggestions
#     (SC2086 "double quote variables", SC2034 "unused variable", etc.) on
#     every existing `run:` block in the target repo. New repos rarely need
#     to fix all of those before they can ship a single PR. Set
#     `run_shellcheck: true` to opt in once the repo is normalized.
#   - prettier auto-installs the target repo's deps if a package.json exists,
#     so prettier plugins (prettier-plugin-svelte etc.) resolve correctly.
#     Skip with `install_node_deps: false` for plain markdown-only repos.
#   - prettier in PR mode checks ONLY files added/modified/renamed by the PR
#     (intersected with `markdown_glob`). On push events it scans the full
#     glob. Set `prettier_changed_only: false` to scan the full glob on PRs
#     too. Rationale: a single badly-formatted file landing on main otherwise
#     poisons every subsequent docs PR's lint check across the fleet.
#   - shellcheck on .sh files is OFF by default for the same reason as
#     actionlint's shellcheck: most repos have pre-existing style/info
#     drift. When opted in, defaults to severity=error so only real bugs
#     fail the check; tighten with `shellcheck_severity: warning` etc.

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      markdown_glob:
        description: "Glob passed to prettier --check. Default '**/*.md'."
        required: false
        type: string
        default: "**/*.md"
      run_actionlint:
        description: "Run actionlint job. Default true."
        required: false
        type: boolean
        default: true
      run_prettier:
        description: "Run prettier --check on markdown. Default true."
        required: false
        type: boolean
        default: true
      prettier_changed_only:
        description: "On PR events, check only files added/modified/renamed in the PR diff (intersected with markdown_glob). Push events always scan the full glob. Default true. Requires `pull-requests: read` on the caller's GITHUB_TOKEN; gracefully falls back to full-glob mode if the API call fails."
        required: false
        type: boolean
        default: true
      run_shellcheck:
        description: "Enable actionlint's shellcheck integration. Default false to avoid info-level style noise on first install."
        required: false
        type: boolean
        default: false
      install_node_deps:
        description: "Run `npm ci` before prettier so plugins (prettier-plugin-svelte etc.) resolve. Default true. Skipped automatically when no package.json present."
        required: false
        type: boolean
        default: true
      run_shellcheck_scripts:
        description: "Run shellcheck on standalone .sh / .bash files and shebang-shell scripts in the repo. Default false (opt-in)."
        required: false
        type: boolean
        default: false
      shellcheck_severity:
        description: "Minimum severity to fail on: error | warning | info | style. Default 'error' so only real bugs fail; bump to 'warning' once style/info drift is normalized."
        required: false
        type: string
        default: "error"
      shellcheck_paths:
        description: "Space-separated list of paths to scan, relative to repo root. Default '.' (recurse from root). Override to narrow, e.g. 'scripts bin'."
        required: false
        type: string
        default: "."

permissions:
  contents: read
  # `pull-requests: read` is requested ONLY by the prettier job (job-level
  # block below) so callers that don't grant it still start the workflow.
  # Workflow-level perms here act as a hard ceiling — if a caller grants
  # only `contents: read`, declaring `pull-requests: read` here causes
  # GitHub to refuse to start the run with `startup_failure`, even when
  # the prettier job itself was supposed to gracefully fall back. That
  # ceiling-vs-job-request distinction was the bug that broke every
  # fleet caller after #29 landed (2026-05-03 23:54 UTC). Keep this list
  # minimal; ask for extra scopes only inside the job that needs them.

jobs:
  actionlint:
    name: actionlint
    # Skip-logic gotcha: GHA's `==` does loose-numeric coercion, so
    # `false == null` evaluates TRUE (both coerce to 0). That defeats
    # the obvious "null OR truthy" check. We instead stringify via format()
    # and compare against the literal 'false' — null stringifies to '',
    # so the only path to skipping is an explicit `run_actionlint: false`
    # from the caller. github.event_name is also unhelpful here: in a
    # reusable, it returns the caller's event (e.g. 'pull_request'), not
    # 'workflow_call'.
    if: ${{ format('{0}', inputs.run_actionlint) != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        # `-shellcheck=` (empty) disables the shellcheck integration. We
        # default to off because info-level shellcheck warnings (SC2086
        # etc.) are noise on most repos and would block the install PR
        # until every existing `run:` block is normalized. Caller opts in
        # with `run_shellcheck: true`. Use string comparison via format()
        # to dodge GHA's loose-numeric-coercion equality gotcha.
        run: |
          if [ "${{ format('{0}', inputs.run_shellcheck) }}" = "true" ]; then
            ${{ steps.get_actionlint.outputs.executable }} -color
          else
            ${{ steps.get_actionlint.outputs.executable }} -color -shellcheck=
          fi
        shell: bash

  prettier:
    name: prettier (markdown)
    if: ${{ format('{0}', inputs.run_prettier) != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Used by `gh api .../pulls/N/files` in changed-only mode. If the
      # caller's GITHUB_TOKEN doesn't grant pull-requests, this job-level
      # request is silently capped — the gh api call 403s and the
      # "Resolve prettier targets" step gracefully falls back to full-glob
      # mode (emits ::warning:: and sets mode=glob). The workflow still
      # starts because this scope is requested at job level, not workflow
      # level — workflow-level perms are a hard ceiling that cause
      # startup_failure if exceeded by the caller's grant.
      pull-requests: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # `actions/setup-node` looks for the lock file at the repo root unless
          # `cache-dependency-path` is provided. `**/package-lock.json` matches
          # subdir lock files (e.g. `frontend/package-lock.json`) and would
          # cause setup-node to fail with "Dependencies lock file is not found"
          # when the root has no lock. Restrict to root files only.
          cache: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json', 'yarn.lock') != '' && 'npm' || '' }}

      # If the target repo has a prettier config that references plugins
      # (e.g. prettier-plugin-svelte), prettier needs the project's
      # node_modules to resolve them. Run `npm ci` (preferred, exact lockfile)
      # or fall back to `npm install` if no lockfile.
      - name: Install target repo's deps (for prettier plugins)
        if: ${{ format('{0}', inputs.install_node_deps) != 'false' && hashFiles('**/package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts --no-audit --no-fund
          else
            npm install --ignore-scripts --no-audit --no-fund
          fi
        shell: bash

      # Decide what files prettier should check. Three modes:
      #   - mode=glob   → existing behavior, run prettier --check "$GLOB"
      #                   (push events, or PRs with prettier_changed_only=false,
      #                   or PRs where listing changed files failed)
      #   - mode=files  → run prettier --check on an explicit file list
      #                   (PRs, default — only files added/modified/renamed
      #                   in the diff that also match the glob)
      #   - mode=none   → no targets; emit a no-op log line and pass
      #                   (a PR that changed zero markdown files)
      #
      # Glob ∩ changed-files intersection is computed by:
      #   1. Asking GitHub for the PR's file list (excludes deletions).
      #   2. Expanding the markdown_glob against the working tree via bash
      #      globstar (handles `**`, brace expansion, etc).
      #   3. `comm -12` of the two sorted sets.
      #
      # Why bash-glob expansion vs hand-rolled regex: prettier's glob
      # dialect (micromatch) and bash's `shopt -s globstar` agree on the
      # cases we care about (`**/*.md`, `docs/**/*.md`, `**/*.{md,markdown}`)
      # and bash is already in the runner. A regex translator would either
      # be wrong on edge cases or large enough to need its own tests.
      - name: Resolve prettier targets
        id: targets
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_ONLY: ${{ inputs.prettier_changed_only }}
          GLOB: ${{ inputs.markdown_glob || '**/*.md' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Push event, or caller opted out → fall back to full-glob mode.
          # `format()`-style stringify pattern: null → '', explicit false → 'false'.
          if [ "$EVENT_NAME" != "pull_request" ] || [ "$(printf '%s' "$CHANGED_ONLY")" = "false" ]; then
            echo "Mode: glob (event=$EVENT_NAME, changed_only=${CHANGED_ONLY:-<unset>})"
            echo "mode=glob" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # PR event with changed-only enabled. Pull the file list from the API.
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "::warning::No PR number available on pull_request event — falling back to full-glob mode."
            echo "mode=glob" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_FILES_LOG="$(mktemp)"
          if ! gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
                --jq '.[] | select(.status != "removed") | .filename' \
                > "$PR_FILES_LOG" 2>/tmp/gh_err; then
            echo "::warning::Could not list PR files (often means the caller's GITHUB_TOKEN lacks 'pull-requests: read'). Falling back to full-glob mode."
            sed 's/^/  /' /tmp/gh_err || true
            echo "mode=glob" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mapfile -t CHANGED < "$PR_FILES_LOG"

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "PR has no added/modified/renamed files."
            echo "mode=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Expand the markdown glob in the working tree.
          shopt -s globstar nullglob
          # `compgen -G` only emits matches and never errors on no-match.
          mapfile -t MATCH_GLOB < <(compgen -G "$GLOB" || true)
          if [ "${#MATCH_GLOB[@]}" -eq 0 ]; then
            echo "No files in working tree match glob '$GLOB'."
            echo "mode=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t TARGETS < <(
            comm -12 \
              <(printf '%s\n' "${CHANGED[@]}" | sort -u) \
              <(printf '%s\n' "${MATCH_GLOB[@]}" | sort -u)
          )
          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "No PR-changed files match glob '$GLOB' — nothing to check."
            echo "mode=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Mode: files (${#TARGETS[@]} target(s) after glob ∩ changed-files):"
          printf '  %s\n' "${TARGETS[@]}"
          {
            echo "mode=files"
            echo "files<<__EOF__"
            printf '%s\n' "${TARGETS[@]}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: prettier --check
        env:
          MODE: ${{ steps.targets.outputs.mode }}
          GLOB: ${{ inputs.markdown_glob || '**/*.md' }}
          FILES: ${{ steps.targets.outputs.files }}
        # Use the project's prettier (with its plugins) when node_modules is
        # populated; otherwise fall back to a one-off prettier@3 install.
        run: |
          set -euo pipefail
          if [ -x node_modules/.bin/prettier ]; then
            PRETTIER=(node_modules/.bin/prettier)
          else
            PRETTIER=(npx --yes prettier@3)
          fi
          case "$MODE" in
            none)
              echo "Skipping prettier — no targets in PR diff."
              ;;
            glob)
              echo "Checking glob: $GLOB"
              "${PRETTIER[@]}" --check "$GLOB"
              ;;
            files)
              # Reconstruct the file list from the heredoc output. The
              # trailing newline of `printf '%s\n'` leaves an empty last
              # element after `<<<` splitting; drop empties.
              mapfile -t FILE_LIST <<< "$FILES"
              cleaned=()
              for f in "${FILE_LIST[@]}"; do [ -n "$f" ] && cleaned+=("$f"); done
              echo "Checking ${#cleaned[@]} PR-changed file(s):"
              printf '  %s\n' "${cleaned[@]}"
              "${PRETTIER[@]}" --check "${cleaned[@]}"
              ;;
            *)
              echo "::error::Unknown prettier target mode: '$MODE'"
              exit 1
              ;;
          esac
        shell: bash

  shellcheck:
    name: shellcheck (scripts)
    # Opt-in only — most repos have style/info shellcheck drift on existing
    # scripts that would flood the first install PR. Caller flips
    # `run_shellcheck_scripts: true` when ready to enforce.
    if: ${{ format('{0}', inputs.run_shellcheck_scripts) == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        # Ubuntu runners ship with shellcheck preinstalled, so no install
        # step needed. We collect:
        #   1. Files matching *.sh / *.bash by name
        #   2. Extension-less files whose first line is a shell shebang
        #      (covers bin/* style scripts that are bash but unmarked).
        # Both lists are filtered to caller-provided paths, then deduped
        # before passing to shellcheck. Severity defaults to 'error' so
        # only actual bugs fail; style/info noise stays advisory.
        run: |
          set -euo pipefail
          SEVERITY="${{ inputs.shellcheck_severity || 'error' }}"
          # shellcheck disable=SC2086
          read -r -a PATHS <<< "${{ inputs.shellcheck_paths || '.' }}"

          # 1. Collect *.sh / *.bash files.
          mapfile -t BY_EXT < <(
            find "${PATHS[@]}" -type f \( -name "*.sh" -o -name "*.bash" \) \
              -not -path "*/.git/*" \
              -not -path "*/node_modules/*" \
              -not -path "*/.husky/_/*" \
              2>/dev/null | sort -u
          )

          # 2. Collect extension-less files with a shell shebang.
          mapfile -t BY_SHEBANG < <(
            find "${PATHS[@]}" -type f ! -name "*.*" \
              -not -path "*/.git/*" \
              -not -path "*/node_modules/*" \
              2>/dev/null | while IFS= read -r f; do
                head -c 256 "$f" 2>/dev/null \
                  | head -1 \
                  | grep -qE '^#!.*/(env +)?(ba)?sh\b' \
                  && echo "$f"
              done | sort -u
          )

          ALL=("${BY_EXT[@]}" "${BY_SHEBANG[@]}")
          if [ "${#ALL[@]}" -eq 0 ]; then
            echo "No shell scripts found under: ${PATHS[*]}"
            exit 0
          fi

          # Dedup (in case a *.sh file also matched the shebang scan).
          mapfile -t UNIQUE < <(printf '%s\n' "${ALL[@]}" | sort -u)

          echo "Checking ${#UNIQUE[@]} script(s) at severity=${SEVERITY}:"
          printf '  %s\n' "${UNIQUE[@]}"
          shellcheck -S "$SEVERITY" "${UNIQUE[@]}"
        shell: bash
