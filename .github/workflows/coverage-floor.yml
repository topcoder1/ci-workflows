name: Coverage Floor

# Two roles for this workflow:
#
# 1. Self-test: triggers on pull_request + push to main of *this repo*.
#    `.coverage-floor` at repo root holds {"current": 99.0, "target": 100.0, …}
#    so enforce mode runs against the 100% coverage of selftest/sample.py.
#
# 2. Reusable: callers do
#       jobs:
#         coverage-floor:
#           uses: topcoder1/ci-workflows/.github/workflows/coverage-floor.yml@main
#           permissions:
#             contents: write       # for post-merge seed PR
#             pull-requests: write  # for sticky coverage comment + seed PR
#    See callers/coverage-floor.yml for a copy-paste-ready caller.
#
# What it does:
#   - Reads .coverage-floor (JSON: {current, target, last_bumped}).
#   - Measures coverage in CI (Python: pytest --cov; Go: go test -coverprofile;
#     JS: vitest --coverage with coverage-summary.json).
#
# Modes:
#   - SEED-NOT-YET (`current == 0.0`):
#       • On pull_request: PASS. Post a comment naming the proposed floor.
#         The install PR is unblocked and can merge without any self-commit.
#       • On push:main: open a follow-up PR titled
#         `chore(coverage): seed floor at X.X%` containing the seeded
#         `.coverage-floor`. That PR is 1-file-change (safe-paths-automerge
#         eligible) and lands the real floor.
#   - ENFORCE (`current > 0.0`):
#       • On pull_request: compare measured vs `current`. Below → FAIL.
#       • On push:main: no-op (post-merge baselines tracked via PR
#         comments, not enforced).
#
# Why split the seed into a separate post-merge PR (not a self-commit on
# the install PR):
#   GitHub's recursion-prevention means `GITHUB_TOKEN` pushes do NOT
#   re-trigger pull_request workflows. A self-commit on the install PR
#   creates a new HEAD SHA with no check runs → PR is "blocked" forever
#   without manual close-and-reopen + empty user push. The original
#   seed-mode design (self-commit on the install PR) hit this on every
#   install. Splitting into a post-merge follow-up PR sidesteps the
#   re-trigger problem entirely. The two-PR flow (install + seed) keeps
#   each PR minimal and auto-mergeable.
#
# Coverage gating is intentionally separate from tests-runner.yml. Reasoning:
# tests must pass before coverage is meaningful. Bundling would couple "tests
# green" and "coverage above floor" into one signal, hiding which actually
# failed. Two reusables, two signals.

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      language:
        description: "Language: auto | python | go | js. Default auto. Multi-language repos pass explicitly."
        required: false
        type: string
        default: "auto"
      working_directory:
        description: "Directory containing the manifest file (pyproject.toml / requirements.txt / go.mod / package.json). Default '.'."
        required: false
        type: string
        default: "."
      floor_file:
        description: "Path to .coverage-floor JSON, relative to working_directory. Default '.coverage-floor'."
        required: false
        type: string
        default: ".coverage-floor"
      seed_minimum:
        description: "Minimum measured coverage required for seed mode to commit. Below this, seed-mode warns and stays armed (so a fresh attempt with corrected test infra can re-seed). Default 1.0%."
        required: false
        type: number
        default: 1.0
      python_version:
        required: false
        type: string
        default: "3.13"
      node_version:
        required: false
        type: string
        default: "20"
      go_version:
        required: false
        type: string
        default: ""
      services_postgres:
        description: "Spin up a postgres container on port 5432 and export DATABASE_URL + TEST_DATABASE_URL to the test step. Default false."
        required: false
        type: boolean
        default: false
      postgres_image:
        description: "Docker image for the postgres service. Default 'postgres:16'. Use e.g. 'pgvector/pgvector:pg16' when tests need the vector extension."
        required: false
        type: string
        default: "postgres:16"
      services_redis:
        description: "Spin up a redis container on port 6379 and export REDIS_URL to the test step. Default false."
        required: false
        type: boolean
        default: false
      redis_image:
        description: "Docker image for the redis service. Default 'redis:7'."
        required: false
        type: string
        default: "redis:7"
      extra_env:
        description: "Newline-separated KEY=value pairs injected into the test step's env (e.g. DISABLE_SENTRY=true). Default empty."
        required: false
        type: string
        default: ""
      extras:
        description: |
          (Python only) Which `[project.optional-dependencies]` extras to install before
          running pytest-cov. Accepts:
            - "all"  (default) — `uv sync --all-extras`, preserves prior behavior
            - "none" — `uv sync` with no extras
            - comma-separated list like "dev,api,model" — `uv sync --extra dev --extra api --extra model`

          Use a targeted list when an extra contains cross-org git deps that uv can't clone
          in CI (e.g. webcat's `crawl` extra pins `webcrawl @ git+https://github.com/topcoder1/webcrawl.git`,
          which needs a PAT with read access to that repo; passing `extras: "dev,api,model,data,headless"`
          skips the crawl extra entirely without changing AUTOMERGE_PAT's scope).

          Burn 2026-05-19 (wxa_webcat): coverage-floor failed silently for 6 days because
          `--all-extras` triggered uv to clone `topcoder1/webcrawl` and AUTOMERGE_PAT lacked
          read scope on that repo. Adding this input lets callers skip the problematic
          extra without the security tradeoff of broadening the fleet PAT's scope.

          No-op for go/js callers (only the python branch honors this input). Also no-op
          when `test_command` is set (caller controls install entirely).
        required: false
        type: string
        default: "all"
      pre_measured_coverage_artifact:
        description: |
          Opt-in. When non-empty, skip the install + test step and download an
          artifact of this name from the same workflow_run. The artifact must
          contain `coverage-percent.txt` — a single-line file with the coverage
          percentage as a number (e.g. "87.4"). Coverage Floor reads the number,
          skips the language-specific install + test invocation, and runs only
          the floor comparison + seed + sticky-comment logic.

          Caller pattern: in a single workflow, the test job runs pytest --cov
          (or equivalent), writes the coverage % to coverage-percent.txt, uploads
          it as an artifact. The coverage-floor job depends on the test job via
          `needs:` and consumes that artifact name via this input.

          The pre-measured caller template lives in topcoder1/dotclaude at
          templates/ci-workflows/callers/coverage-floor-pre-measured.yml.

          Saves ~50% of Coverage Floor's per-run minutes for repos where the
          caller's CI already runs the same test suite. Existing callers that
          don't pass this input keep the current behavior (run tests fresh).

          Language-agnostic — the reusable just reads the percent. Caller's CI
          computes it however (pytest-cov, go cover, vitest, custom script).
        required: false
        type: string
        default: ""
      test_command:
        description: |
          Caller-provided shell command to install deps and run tests with coverage.
          Completely replaces the default language-specific install + pytest/go-test/npm-test
          invocation. The command MUST produce the coverage file expected by the language:
            - python: `coverage.json` at working_directory (use `pytest --cov --cov-report=json`)
            - go:     `cov.out` at working_directory (use `go test -coverprofile=cov.out ./...`)
            - js:     `coverage/coverage-summary.json` at working_directory (configure
                      vitest/jest with json-summary reporter)
          Use when the default install path can't handle your repo's structure (e.g. layered
          projects where root pyproject defines the package and tests live in a subdir, or
          repos that need pre-install steps the reusable doesn't know about). Run with
          `set -euo pipefail` style discipline. Trailing `|| true` is appropriate after the
          test invocation so the coverage file gets parsed even when tests fail (coverage
          floor cares about the number, not pass/fail — that's tests-runner.yml's job).
          Default empty (use the language-specific default path).
        required: false
        type: string
        default: ""
    secrets:
      AUTOMERGE_PAT:
        description: "PAT used to push the seed branch and open the seed PR so that pull_request workflows actually fire (GITHUB_TOKEN doesn't trigger them — recursion prevention). Already deployed fleet-wide for `claude-author-automerge.yml`. Caller must explicitly forward this secret (see callers/coverage-floor.yml in topcoder1/dotclaude for the syntax). Required for the post-merge seed flow to land without manual unblock."
        required: false  # absence falls back to GITHUB_TOKEN + warning

permissions:
  contents: write       # post-merge seed branch + push
  pull-requests: write  # sticky PR comment + open seed PR

jobs:
  measure:
    name: Measure coverage and enforce floor
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ inputs.postgres_image || 'postgres:16' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: ${{ inputs.redis_image || 'redis:7' }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PR branch ref so seed-mode push targets the right branch.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ github.token }}

      - name: Read .coverage-floor
        id: floor
        env:
          INPUT_WORKDIR: ${{ inputs.working_directory || '.' }}
          INPUT_FLOOR_FILE: ${{ inputs.floor_file || '.coverage-floor' }}
        run: |
          set -euo pipefail
          cd "$INPUT_WORKDIR"
          if [[ ! -f "$INPUT_FLOOR_FILE" ]]; then
            echo "::error::missing $INPUT_FLOOR_FILE — run install-coverage-floor.sh to seed it"
            exit 1
          fi
          # Validate JSON before parsing fields.
          if ! jq empty "$INPUT_FLOOR_FILE" 2>/dev/null; then
            echo "::error::$INPUT_FLOOR_FILE is not valid JSON"
            exit 1
          fi
          CURRENT=$(jq -r '.current' "$INPUT_FLOOR_FILE")
          TARGET=$(jq -r '.target' "$INPUT_FLOOR_FILE")
          LAST_BUMPED=$(jq -r '.last_bumped' "$INPUT_FLOOR_FILE")
          # Seed mode triggers when current == 0.0 (or 0).
          MODE="enforce"
          if awk -v c="$CURRENT" 'BEGIN {exit !(c <= 0.0)}'; then
            MODE="seed"
          fi
          {
            echo "current=$CURRENT"
            echo "target=$TARGET"
            echo "last_bumped=$LAST_BUMPED"
            echo "mode=$MODE"
          } >> "$GITHUB_OUTPUT"
          echo ".coverage-floor: current=$CURRENT target=$TARGET last_bumped=$LAST_BUMPED mode=$MODE"

      - name: Detect language
        id: detect
        env:
          INPUT_LANGUAGE: ${{ inputs.language || 'auto' }}
          INPUT_WORKDIR: ${{ inputs.working_directory || '.' }}
          INPUT_GO_VERSION: ${{ inputs.go_version || '' }}
        run: |
          set -euo pipefail
          cd "$INPUT_WORKDIR"
          if [[ "$INPUT_LANGUAGE" == "auto" ]]; then
            found=()
            { [[ -f pyproject.toml ]] || [[ -f requirements.txt ]]; } && found+=("python")
            [[ -f go.mod ]] && found+=("go")
            [[ -f package.json ]] && found+=("js")
            if [[ ${#found[@]} -eq 0 ]]; then
              echo "::error::no language manifest in '$INPUT_WORKDIR' (pyproject.toml / requirements.txt / go.mod / package.json). Pass \`language:\` explicitly."
              exit 1
            elif [[ ${#found[@]} -gt 1 ]]; then
              echo "::error::ambiguous language detection: ${found[*]}. Pass \`language:\` and \`working_directory:\` explicitly."
              exit 1
            fi
            LANG="${found[0]}"
          else
            LANG="$INPUT_LANGUAGE"
          fi
          GO_VER="$INPUT_GO_VERSION"
          if [[ "$LANG" == "go" && -z "$GO_VER" && -f go.mod ]]; then
            GO_VER=$(awk '/^go [0-9]+\.[0-9]+/ {print $2; exit}' go.mod || true)
          fi
          [[ -z "$GO_VER" ]] && GO_VER="1.23"
          {
            echo "language=$LANG"
            echo "go_version=$GO_VER"
          } >> "$GITHUB_OUTPUT"

      # Download pre-measured coverage when the caller's CI already ran tests
      # with --cov and uploaded a coverage-percent.txt artifact. Skips all the
      # install + test steps below.
      - name: Download pre-measured coverage artifact
        if: inputs.pre_measured_coverage_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.pre_measured_coverage_artifact }}
          path: ${{ inputs.working_directory || '.' }}

      # Language + tooling setup. Skipped when consuming a pre-measured artifact
      # (no tests to run → no toolchain needed).
      - uses: actions/setup-python@v5
        if: steps.detect.outputs.language == 'python' && inputs.pre_measured_coverage_artifact == ''
        with:
          python-version: ${{ inputs.python_version || '3.13' }}
      - name: Install uv (python)
        if: steps.detect.outputs.language == 'python' && inputs.pre_measured_coverage_artifact == ''
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-go@v5
        if: steps.detect.outputs.language == 'go' && inputs.pre_measured_coverage_artifact == ''
        with:
          go-version: ${{ steps.detect.outputs.go_version }}
      - uses: actions/setup-node@v6
        if: steps.detect.outputs.language == 'js' && inputs.pre_measured_coverage_artifact == ''
        with:
          node-version: ${{ inputs.node_version || '20' }}

      - name: Export service env vars + extra_env
        if: inputs.pre_measured_coverage_artifact == ''
        env:
          SERVICES_POSTGRES: ${{ inputs.services_postgres || 'false' }}
          SERVICES_REDIS: ${{ inputs.services_redis || 'false' }}
          EXTRA_ENV: ${{ inputs.extra_env || '' }}
        run: |
          set -euo pipefail
          if [[ "$SERVICES_POSTGRES" == "true" ]]; then
            echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres" >> "$GITHUB_ENV"
            echo "TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres" >> "$GITHUB_ENV"
          fi
          if [[ "$SERVICES_REDIS" == "true" ]]; then
            echo "REDIS_URL=redis://localhost:6379/0" >> "$GITHUB_ENV"
          fi
          if [[ -n "$EXTRA_ENV" ]]; then
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              echo "$line" >> "$GITHUB_ENV"
            done <<< "$EXTRA_ENV"
          fi

      - name: Configure git for cross-org clones (Python only)
        # `uv sync` invokes `git clone` for git-URL dependencies (e.g.
        # `webcrawl @ git+https://github.com/topcoder1/webcrawl.git`). The
        # checkout step authenticated git with `github.token`, which is
        # scoped to the calling repo only — cross-org clones to a different
        # org return 404 (or appear empty in workflows that swallow stderr).
        # When the caller forwards `AUTOMERGE_PAT` (already deployed fleet-
        # wide for the seed-PR flow), reuse it here as a read credential for
        # the topcoder1 org's public-but-rate-limited repos.
        #
        # We only rewrite URLs for `topcoder1/*` — not a global insteadOf —
        # so the PAT never leaks to clones of other orgs. If
        # AUTOMERGE_PAT isn't forwarded, this step no-ops and uv sync uses
        # the github.token configured by actions/checkout (which works for
        # same-org git URLs but not cross-org). Same fallback shape as the
        # seed-PR step below.
        #
        # Burn 2026-05-13: wxa_webcat PRs failing coverage-floor with
        # `failed to fetch commit 27970847... topcoder1/webcrawl.git` —
        # uv sync couldn't clone the pinned webcrawl revision because the
        # github.token from whois-api-llc/wxa_webcat doesn't read from
        # topcoder1/webcrawl. The CI workflow (`Lint and Test`) didn't hit
        # this because it uses a different uv invocation that doesn't
        # actually exercise the git-URL dep at install time.
        if: steps.detect.outputs.language == 'python' && inputs.pre_measured_coverage_artifact == ''
        env:
          CROSS_ORG_PAT: ${{ secrets.AUTOMERGE_PAT }}
        run: |
          set -euo pipefail
          if [[ -n "${CROSS_ORG_PAT:-}" ]]; then
            git config --global \
              url."https://x-access-token:${CROSS_ORG_PAT}@github.com/topcoder1/".insteadOf \
              "https://github.com/topcoder1/"
            echo "==> Configured git insteadOf for topcoder1/* using AUTOMERGE_PAT"
          else
            echo "::warning::AUTOMERGE_PAT not forwarded by caller. Cross-org git-URL dependencies (e.g. webcrawl from topcoder1/*) will fail with 404 on uv sync. Forward the secret in the caller's job spec — see callers/coverage-floor.yml."
          fi

      # Parse pre-measured artifact when caller opted in.
      - name: Read coverage from pre-measured artifact
        id: measure_cached
        if: inputs.pre_measured_coverage_artifact != ''
        working-directory: ${{ inputs.working_directory || '.' }}
        run: |
          set -euo pipefail
          if [[ ! -f coverage-percent.txt ]]; then
            echo "::error::pre_measured_coverage_artifact '${{ inputs.pre_measured_coverage_artifact }}' is missing coverage-percent.txt at working_directory. Caller's test job must emit this file and include it in the uploaded artifact."
            exit 1
          fi
          RAW=$(tr -d '[:space:]' < coverage-percent.txt)
          if ! [[ "$RAW" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::coverage-percent.txt contains non-numeric content: '$RAW'. Expected a single number like '87.4'."
            exit 1
          fi
          MEASURED=$(awk -v m="$RAW" 'BEGIN {printf "%.1f", m}')
          echo "measured=$MEASURED" >> "$GITHUB_OUTPUT"
          echo "measured coverage (from artifact): $MEASURED%"

      - name: Measure coverage
        id: measure_fresh
        if: inputs.pre_measured_coverage_artifact == ''
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          LANG_TYPE: ${{ steps.detect.outputs.language }}
          EXTRAS: ${{ inputs.extras }}
          INPUT_TEST_COMMAND: ${{ inputs.test_command || '' }}
        run: |
          set -euo pipefail
          # When the caller provides test_command, it replaces the language-specific
          # install + pytest/go-test/npm-test invocation. The coverage-file existence
          # check + MEASURED extraction at the end of each case branch still runs,
          # so the caller's command MUST produce the file the workflow expects
          # (Python: coverage.json, Go: cov.out, JS: coverage/coverage-summary.json).
          # Used by layered repos where the default `uv sync` / `pip install -r`
          # path can't pick up the right package + extras.
          case "$LANG_TYPE" in
            python)
              if [[ -n "$INPUT_TEST_COMMAND" ]]; then
                echo "==> caller test_command override (python)"
                eval "$INPUT_TEST_COMMAND"
              elif [[ -f pyproject.toml ]]; then
                # extras controls which [project.optional-dependencies] extras get
                # installed before pytest-cov runs. Default ("all") preserves the
                # original --all-extras behavior — repos that put test deps only
                # in optional-dependencies need this so pytest collection doesn't
                # hit ModuleNotFoundError (burned 2026-05-12 wave-3 — domain-rank,
                # ipgeo_core, crawl-infra all needed per-repo pyproject mirrors).
                #
                # "none" skips extras entirely. A comma-separated list installs
                # only the named extras. Use the list form when an extra contains
                # cross-org git deps that uv can't clone in CI (burn 2026-05-19,
                # wxa_webcat — webcat's `crawl` extra pulls webcrawl from topcoder1
                # which needs broader PAT scope than AUTOMERGE_PAT provides).
                case "${EXTRAS:-all}" in
                  all)
                    uv sync --quiet --all-extras
                    ;;
                  none|"")
                    uv sync --quiet
                    ;;
                  *)
                    # Comma-separated list. Build --extra flags.
                    EXTRA_FLAGS=()
                    IFS=',' read -ra EXTRA_LIST <<< "$EXTRAS"
                    for e in "${EXTRA_LIST[@]}"; do
                      e_trimmed="$(echo "$e" | xargs)"  # strip whitespace
                      if [[ -n "$e_trimmed" ]]; then
                        EXTRA_FLAGS+=("--extra" "$e_trimmed")
                      fi
                    done
                    echo "==> uv sync --quiet ${EXTRA_FLAGS[*]}"
                    uv sync --quiet "${EXTRA_FLAGS[@]}"
                    ;;
                esac
                # Some repos have pyproject.toml as config-only (no [project]
                # deps section) and keep actual deps in requirements.txt
                # (inbox_superpilot/backend pattern). Install those on top so
                # `uv run pytest` can import everything.
                [[ -f requirements.txt ]]     && uv pip install --quiet -r requirements.txt
                [[ -f requirements-dev.txt ]] && uv pip install --quiet -r requirements-dev.txt
                uv pip install --quiet pytest-cov
                # `|| true` lets us still parse coverage.json even when tests fail
                # (tests-runner.yml is the gate for test pass/fail; we just need
                # the coverage number here).
                uv run pytest --cov --cov-report=json --quiet || true
              else
                python -m venv .venv
                .venv/bin/pip install -q -r requirements.txt pytest pytest-cov
                .venv/bin/pytest --cov --cov-report=json --quiet || true
              fi
              if [[ ! -f coverage.json ]]; then
                echo "::error::pytest-cov did not produce coverage.json — check [tool.coverage.run] config or test discovery"
                exit 1
              fi
              MEASURED=$(jq '.totals.percent_covered' coverage.json)
              ;;
            go)
              if [[ -n "$INPUT_TEST_COMMAND" ]]; then
                echo "==> caller test_command override (go)"
                eval "$INPUT_TEST_COMMAND"
              else
                go test -coverprofile=cov.out ./... 2>&1 || true
              fi
              if [[ ! -f cov.out ]]; then
                echo "::error::go test did not produce cov.out — no testable packages?"
                exit 1
              fi
              MEASURED=$(go tool cover -func=cov.out | awk '/^total:/ {gsub("%","",$3); print $3}')
              ;;
            js)
              # JS test runners take different reporter-config flags (vitest:
              # `--coverage.reporter=json-summary`; jest:
              # `--coverageReporters=json-summary`; etc). Rather than try to
              # guess from the lockfile, this workflow ONLY passes `--coverage`
              # and requires the caller to have json-summary configured in
              # their test runner's config file:
              #   - vitest: `coverage: { reporter: ['json-summary'] }` in vite.config.ts
              #   - jest:   `coverageReporters: ['json-summary']` in jest.config.js
              #   - bun:    bun test --coverage emits coverage-summary.json by default
              # If neither is present, the workflow fails with a clear error
              # pointing at the caller's test config.
              if [[ -n "$INPUT_TEST_COMMAND" ]]; then
                echo "==> caller test_command override (js)"
                eval "$INPUT_TEST_COMMAND"
              elif [[ -f bun.lockb || -f bun.lock ]]; then
                curl -fsSL https://bun.sh/install | bash
                export PATH="$HOME/.bun/bin:$PATH"
                bun install --frozen-lockfile
                bun test --coverage || true
              elif [[ -f pnpm-lock.yaml ]]; then
                npm install -g pnpm
                pnpm install --frozen-lockfile
                pnpm test -- --coverage || true
              elif [[ -f yarn.lock ]]; then
                yarn install --frozen-lockfile
                yarn test --coverage || true
              else
                npm ci
                npm test -- --coverage || true
              fi
              if [[ ! -f coverage/coverage-summary.json ]]; then
                echo "::error::no coverage/coverage-summary.json produced. Configure your test runner to emit json-summary:"
                echo "::error::  vitest: add 'coverage: { reporter: [\"json-summary\"] }' to vite.config.ts"
                echo "::error::  jest:   add 'coverageReporters: [\"json-summary\"]' to jest.config.js"
                echo "::error::  also ensure a coverage provider is installed (vitest: @vitest/coverage-v8)"
                exit 1
              fi
              MEASURED=$(jq '.total.lines.pct' coverage/coverage-summary.json)
              ;;
          esac
          # Round to 1 decimal for stability across runs.
          MEASURED=$(awk -v m="$MEASURED" 'BEGIN {printf "%.1f", m}')
          echo "measured=$MEASURED" >> "$GITHUB_OUTPUT"
          echo "measured coverage: $MEASURED%"

      - name: Seed-not-yet on PR — pass-through with comment
        # Install PR ships current=0. Don't self-commit (would create a new
        # HEAD SHA that GITHUB_TOKEN can't re-trigger workflows on). Just
        # pass and let the install PR merge naturally. The push:main run
        # opens a follow-up seed PR with the real value.
        if: steps.floor.outputs.mode == 'seed' && github.event_name == 'pull_request'
        env:
          MEASURED: ${{ steps.measure_fresh.outputs.measured || steps.measure_cached.outputs.measured }}
        run: |
          echo "seed-not-yet on PR: measured $MEASURED%; PASS (will seed via post-merge follow-up PR)"

      - name: Seed-not-yet on main — open follow-up seed PR
        if: steps.floor.outputs.mode == 'seed' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          MEASURED: ${{ steps.measure_fresh.outputs.measured || steps.measure_cached.outputs.measured }}
          TARGET: ${{ steps.floor.outputs.target }}
          INPUT_FLOOR_FILE: ${{ inputs.floor_file || '.coverage-floor' }}
          SEED_MIN: ${{ inputs.seed_minimum || '1.0' }}
          # Use AUTOMERGE_PAT if forwarded by the caller; fall back to
          # GITHUB_TOKEN with a warning (recursion-prevention means seed
          # PR opened by GITHUB_TOKEN won't spawn pull_request workflows,
          # so the seed PR will sit "blocked" until a user pushes an
          # empty commit to its branch).
          AUTOMERGE_PAT: ${{ secrets.AUTOMERGE_PAT }}
        run: |
          set -euo pipefail
          # Loop-prevention guard: refuse to seed below seed_minimum.
          # Otherwise an install on a repo with broken test infra would
          # generate a 0% seed PR; here on main, we just no-op with a warning.
          if awk -v m="$MEASURED" -v t="$SEED_MIN" 'BEGIN {exit !(m < t)}'; then
            echo "::warning::measured coverage $MEASURED% < seed_minimum $SEED_MIN% on main — not opening seed PR. Investigate test infra OR manually edit .coverage-floor with the right value."
            exit 0
          fi
          PROPOSED=$(awk -v m="$MEASURED" 'BEGIN {x = m - 0.5; if (x < 0) x = 0; printf "%.1f", x}')
          TODAY=$(date -u +%Y-%m-%d)

          # Select the auth token. Prefer AUTOMERGE_PAT (the seed PR will
          # spawn pull_request workflows naturally); fall back to GITHUB_TOKEN
          # with a warning so the operator knows manual unblock is needed.
          if [[ -n "${AUTOMERGE_PAT:-}" ]]; then
            export GH_TOKEN="$AUTOMERGE_PAT"
            PUSH_URL="https://x-access-token:${AUTOMERGE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
            echo "==> Using AUTOMERGE_PAT for seed branch push + PR open (workflows will fire naturally)"
          else
            export GH_TOKEN="${{ github.token }}"
            PUSH_URL="origin"
            echo "::warning::AUTOMERGE_PAT secret not forwarded by caller. Falling back to GITHUB_TOKEN, which won't spawn pull_request workflows on the seed PR. The seed PR will be 'blocked' until someone pushes an empty commit to its branch. See callers/coverage-floor.yml in topcoder1/dotclaude for how to forward the secret."
          fi

          # Ensure the label exists (idempotent).
          gh label create coverage-floor-seed \
            --description "Auto-opened by coverage-floor.yml to seed the floor after install" \
            --color 0E8A16 2>/dev/null || true

          # Idempotency: if a seed PR is already open from this workflow, skip.
          if gh pr list --state open --label coverage-floor-seed --limit 1 --json number --jq '.[].number' | grep -q .; then
            echo "a coverage-floor-seed PR is already open — skipping"
            exit 0
          fi

          # SHA-INDEPENDENT branch name so the git-push itself is the atomic
          # lock. Concurrent runs on main (e.g. 5 back-to-back merges) each
          # pass the `gh pr list --label` idempotency check before any of them
          # has opened a PR — the check races. A SHA-keyed branch doesn't help
          # because each concurrent run is on a different HEAD SHA, giving each
          # run a unique branch with no collision. A fixed branch name means
          # only the first push succeeds; subsequent pushes fail with
          # "already exists" and exit 0 (see the `if !` guard below).
          # Caught 2026-05-12 on wxa_webcat: 3 install PRs merged rapidly,
          # all 3 runs passed the label check, 2 duplicate seed PRs (#331, #332)
          # opened and merged. The label check stays as belt-and-suspenders for
          # the case where a previous seed PR merged but its branch was deleted
          # while a label still exists.
          BRANCH="chore/coverage-floor-seed"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          jq --argjson c "$PROPOSED" --argjson t "$TARGET" --arg d "$TODAY" \
            '{current: $c, target: $t, last_bumped: $d}' "$INPUT_FLOOR_FILE" > "$INPUT_FLOOR_FILE.tmp"
          mv "$INPUT_FLOOR_FILE.tmp" "$INPUT_FLOOR_FILE"

          git add "$INPUT_FLOOR_FILE"
          git commit -m "chore(coverage): seed floor at ${PROPOSED}% (measured ${MEASURED}%)" \
            -m "Auto-seeded post-merge by coverage-floor.yml. After this PR merges, future PRs enforce this floor."
          if ! git push -u "$PUSH_URL" "$BRANCH" 2>&1; then
            echo "::warning::another seed-floor run beat us to pushing the branch — skipping (this is safe; one seed PR is enough)"
            exit 0
          fi

          # Open the seed PR. `.coverage-floor` is NOT in the built-in
          # safe-paths-automerge globs (which cover docs/** and tests/**
          # only), so safe-paths-automerge.yml will no-op on this PR and
          # nothing else self-enables auto-merge — the branch prefix
          # `chore/coverage-floor-seed` doesn't match claude-author-
          # automerge's `claude/*` detection either. So we enable auto-
          # merge here explicitly.
          PR_BODY=$(printf 'Post-merge seed of `.coverage-floor` after coverage-floor caller install. Measured coverage on main: %s%%. Floor seeded at %s%% (measured - 0.5%% buffer).\n\nAfter this merges, future PRs run `coverage-floor.yml` in enforce mode against this floor.\n\n🤖 Auto-opened by topcoder1/ci-workflows/.github/workflows/coverage-floor.yml' "$MEASURED" "$PROPOSED")
          # Pass --head explicitly. `git push -u "$PUSH_URL" "$BRANCH"` set the
          # upstream tracking to the PAT-embedded URL (not `origin`), so gh
          # can't autodetect the head branch from upstream config. Without
          # --head it errors: "you must first push the current branch to a
          # remote, or use the --head flag". Caught on wxa-graph install
          # (the seed branch was pushed, but PR-create failed).
          PR_URL=$(gh pr create --title "chore(coverage): seed floor at ${PROPOSED}% (measured ${MEASURED}%)" \
            --body "$PR_BODY" \
            --base "${GITHUB_REF_NAME}" \
            --head "$BRANCH" \
            --label coverage-floor-seed)
          echo "Opened seed PR: $PR_URL"

          # Enable auto-merge. Required status checks still gate the merge;
          # this just queues it to land once they pass. The PR diff is a
          # single JSON file with a numeric bump — claude-author-automerge's
          # high-risk-path regex doesn't match, so auto-merge is the right
          # default. Without this, the seed PR sits open indefinitely after
          # all checks pass (observed 2026-05-12 across 3 simultaneous
          # rollouts).
          gh pr merge --auto --squash "$PR_URL" || \
            echo "::warning::Failed to enable auto-merge on seed PR. Set it manually with 'gh pr merge --auto --squash $PR_URL'."

      - name: Enforce mode — compare measured vs floor
        if: steps.floor.outputs.mode == 'enforce' && github.event_name == 'pull_request'
        env:
          MEASURED: ${{ steps.measure_fresh.outputs.measured || steps.measure_cached.outputs.measured }}
          FLOOR: ${{ steps.floor.outputs.current }}
        run: |
          set -euo pipefail
          if awk -v m="$MEASURED" -v f="$FLOOR" 'BEGIN {exit !(m >= f)}'; then
            echo "PASS: measured $MEASURED% >= floor $FLOOR%"
          else
            DROP=$(awk -v m="$MEASURED" -v f="$FLOOR" 'BEGIN {printf "%.1f", f - m}')
            echo "::error::FAIL: measured $MEASURED% < floor $FLOOR% (drop of $DROP%)"
            exit 1
          fi

      - name: Enforce mode on main — no-op (baseline tracking only)
        if: steps.floor.outputs.mode == 'enforce' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          MEASURED: ${{ steps.measure_fresh.outputs.measured || steps.measure_cached.outputs.measured }}
          FLOOR: ${{ steps.floor.outputs.current }}
        run: |
          echo "post-merge baseline: measured $MEASURED% vs floor $FLOOR% (no enforcement on main; PR gates handle regressions)"

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-floor
          message: |
            **Coverage Floor** — mode: `${{ steps.floor.outputs.mode }}`

            | metric | value |
            |---|---|
            | measured | `${{ steps.measure_fresh.outputs.measured || steps.measure_cached.outputs.measured }}%` |
            | floor (current) | `${{ steps.floor.outputs.current }}%` |
            | target | `${{ steps.floor.outputs.target }}%` |
            | last bumped | `${{ steps.floor.outputs.last_bumped }}` |

            ${{ steps.floor.outputs.mode == 'seed' && '_Seed-not-yet: floor==0 means coverage is not enforced yet. After this PR merges, the push:main run opens a follow-up PR `chore(coverage): seed floor at X.X%` to commit the real value. From then on, future PRs run in enforce mode._' || '' }}
