name: Coverage Floor

# Two roles for this workflow:
#
# 1. Self-test: triggers on pull_request + push to main of *this repo*.
#    `.coverage-floor` at repo root holds {"current": 99.0, "target": 100.0, …}
#    so enforce mode runs against the 100% coverage of selftest/sample.py.
#
# 2. Reusable: callers do
#       jobs:
#         coverage-floor:
#           uses: topcoder1/ci-workflows/.github/workflows/coverage-floor.yml@main
#           permissions:
#             contents: write       # for post-merge seed PR
#             pull-requests: write  # for sticky coverage comment + seed PR
#    See callers/coverage-floor.yml for a copy-paste-ready caller.
#
# What it does:
#   - Reads .coverage-floor (JSON: {current, target, last_bumped}).
#   - Measures coverage in CI (Python: pytest --cov; Go: go test -coverprofile;
#     JS: vitest --coverage with coverage-summary.json).
#
# Modes:
#   - SEED-NOT-YET (`current == 0.0`):
#       • On pull_request: PASS. Post a comment naming the proposed floor.
#         The install PR is unblocked and can merge without any self-commit.
#       • On push:main: open a follow-up PR titled
#         `chore(coverage): seed floor at X.X%` containing the seeded
#         `.coverage-floor`. That PR is 1-file-change (safe-paths-automerge
#         eligible) and lands the real floor.
#   - ENFORCE (`current > 0.0`):
#       • On pull_request: compare measured vs `current`. Below → FAIL.
#       • On push:main: no-op (post-merge baselines tracked via PR
#         comments, not enforced).
#
# Why split the seed into a separate post-merge PR (not a self-commit on
# the install PR):
#   GitHub's recursion-prevention means `GITHUB_TOKEN` pushes do NOT
#   re-trigger pull_request workflows. A self-commit on the install PR
#   creates a new HEAD SHA with no check runs → PR is "blocked" forever
#   without manual close-and-reopen + empty user push. The original
#   seed-mode design (self-commit on the install PR) hit this on every
#   install. Splitting into a post-merge follow-up PR sidesteps the
#   re-trigger problem entirely. The two-PR flow (install + seed) keeps
#   each PR minimal and auto-mergeable.
#
# Coverage gating is intentionally separate from tests-runner.yml. Reasoning:
# tests must pass before coverage is meaningful. Bundling would couple "tests
# green" and "coverage above floor" into one signal, hiding which actually
# failed. Two reusables, two signals.

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      language:
        description: "Language: auto | python | go | js. Default auto. Multi-language repos pass explicitly."
        required: false
        type: string
        default: "auto"
      working_directory:
        description: "Directory containing the manifest file (pyproject.toml / requirements.txt / go.mod / package.json). Default '.'."
        required: false
        type: string
        default: "."
      floor_file:
        description: "Path to .coverage-floor JSON, relative to working_directory. Default '.coverage-floor'."
        required: false
        type: string
        default: ".coverage-floor"
      seed_minimum:
        description: "Minimum measured coverage required for seed mode to commit. Below this, seed-mode warns and stays armed (so a fresh attempt with corrected test infra can re-seed). Default 1.0%."
        required: false
        type: number
        default: 1.0
      python_version:
        required: false
        type: string
        default: "3.13"
      node_version:
        required: false
        type: string
        default: "20"
      go_version:
        required: false
        type: string
        default: ""
    secrets:
      AUTOMERGE_PAT:
        description: "PAT used to push the seed branch and open the seed PR so that pull_request workflows actually fire (GITHUB_TOKEN doesn't trigger them — recursion prevention). Already deployed fleet-wide for `claude-author-automerge.yml`. Caller must explicitly forward this secret (see callers/coverage-floor.yml in topcoder1/dotclaude for the syntax). Required for the post-merge seed flow to land without manual unblock."
        required: false  # absence falls back to GITHUB_TOKEN + warning

permissions:
  contents: write       # post-merge seed branch + push
  pull-requests: write  # sticky PR comment + open seed PR

jobs:
  measure:
    name: Measure coverage and enforce floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PR branch ref so seed-mode push targets the right branch.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ github.token }}

      - name: Read .coverage-floor
        id: floor
        env:
          INPUT_WORKDIR: ${{ inputs.working_directory || '.' }}
          INPUT_FLOOR_FILE: ${{ inputs.floor_file || '.coverage-floor' }}
        run: |
          set -euo pipefail
          cd "$INPUT_WORKDIR"
          if [[ ! -f "$INPUT_FLOOR_FILE" ]]; then
            echo "::error::missing $INPUT_FLOOR_FILE — run install-coverage-floor.sh to seed it"
            exit 1
          fi
          # Validate JSON before parsing fields.
          if ! jq empty "$INPUT_FLOOR_FILE" 2>/dev/null; then
            echo "::error::$INPUT_FLOOR_FILE is not valid JSON"
            exit 1
          fi
          CURRENT=$(jq -r '.current' "$INPUT_FLOOR_FILE")
          TARGET=$(jq -r '.target' "$INPUT_FLOOR_FILE")
          LAST_BUMPED=$(jq -r '.last_bumped' "$INPUT_FLOOR_FILE")
          # Seed mode triggers when current == 0.0 (or 0).
          MODE="enforce"
          if awk -v c="$CURRENT" 'BEGIN {exit !(c <= 0.0)}'; then
            MODE="seed"
          fi
          {
            echo "current=$CURRENT"
            echo "target=$TARGET"
            echo "last_bumped=$LAST_BUMPED"
            echo "mode=$MODE"
          } >> "$GITHUB_OUTPUT"
          echo ".coverage-floor: current=$CURRENT target=$TARGET last_bumped=$LAST_BUMPED mode=$MODE"

      - name: Detect language
        id: detect
        env:
          INPUT_LANGUAGE: ${{ inputs.language || 'auto' }}
          INPUT_WORKDIR: ${{ inputs.working_directory || '.' }}
          INPUT_GO_VERSION: ${{ inputs.go_version || '' }}
        run: |
          set -euo pipefail
          cd "$INPUT_WORKDIR"
          if [[ "$INPUT_LANGUAGE" == "auto" ]]; then
            found=()
            { [[ -f pyproject.toml ]] || [[ -f requirements.txt ]]; } && found+=("python")
            [[ -f go.mod ]] && found+=("go")
            [[ -f package.json ]] && found+=("js")
            if [[ ${#found[@]} -eq 0 ]]; then
              echo "::error::no language manifest in '$INPUT_WORKDIR' (pyproject.toml / requirements.txt / go.mod / package.json). Pass \`language:\` explicitly."
              exit 1
            elif [[ ${#found[@]} -gt 1 ]]; then
              echo "::error::ambiguous language detection: ${found[*]}. Pass \`language:\` and \`working_directory:\` explicitly."
              exit 1
            fi
            LANG="${found[0]}"
          else
            LANG="$INPUT_LANGUAGE"
          fi
          GO_VER="$INPUT_GO_VERSION"
          if [[ "$LANG" == "go" && -z "$GO_VER" && -f go.mod ]]; then
            GO_VER=$(awk '/^go [0-9]+\.[0-9]+/ {print $2; exit}' go.mod || true)
          fi
          [[ -z "$GO_VER" ]] && GO_VER="1.23"
          {
            echo "language=$LANG"
            echo "go_version=$GO_VER"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.language == 'python'
        with:
          python-version: ${{ inputs.python_version || '3.13' }}
      - name: Install uv (python)
        if: steps.detect.outputs.language == 'python'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-go@v5
        if: steps.detect.outputs.language == 'go'
        with:
          go-version: ${{ steps.detect.outputs.go_version }}
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.language == 'js'
        with:
          node-version: ${{ inputs.node_version || '20' }}

      - name: Measure coverage
        id: measure
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          LANG_TYPE: ${{ steps.detect.outputs.language }}
        run: |
          set -euo pipefail
          case "$LANG_TYPE" in
            python)
              if [[ -f pyproject.toml ]]; then
                uv sync --quiet
                uv pip install --quiet pytest-cov
                # `|| true` lets us still parse coverage.json even when tests fail
                # (tests-runner.yml is the gate for test pass/fail; we just need
                # the coverage number here).
                uv run pytest --cov --cov-report=json --quiet || true
              else
                python -m venv .venv
                .venv/bin/pip install -q -r requirements.txt pytest pytest-cov
                .venv/bin/pytest --cov --cov-report=json --quiet || true
              fi
              if [[ ! -f coverage.json ]]; then
                echo "::error::pytest-cov did not produce coverage.json — check [tool.coverage.run] config or test discovery"
                exit 1
              fi
              MEASURED=$(jq '.totals.percent_covered' coverage.json)
              ;;
            go)
              go test -coverprofile=cov.out ./... 2>&1 || true
              if [[ ! -f cov.out ]]; then
                echo "::error::go test did not produce cov.out — no testable packages?"
                exit 1
              fi
              MEASURED=$(go tool cover -func=cov.out | awk '/^total:/ {gsub("%","",$3); print $3}')
              ;;
            js)
              # JS test runners take different reporter-config flags (vitest:
              # `--coverage.reporter=json-summary`; jest:
              # `--coverageReporters=json-summary`; etc). Rather than try to
              # guess from the lockfile, this workflow ONLY passes `--coverage`
              # and requires the caller to have json-summary configured in
              # their test runner's config file:
              #   - vitest: `coverage: { reporter: ['json-summary'] }` in vite.config.ts
              #   - jest:   `coverageReporters: ['json-summary']` in jest.config.js
              #   - bun:    bun test --coverage emits coverage-summary.json by default
              # If neither is present, the workflow fails with a clear error
              # pointing at the caller's test config.
              if [[ -f bun.lockb || -f bun.lock ]]; then
                curl -fsSL https://bun.sh/install | bash
                export PATH="$HOME/.bun/bin:$PATH"
                bun install --frozen-lockfile
                bun test --coverage || true
              elif [[ -f pnpm-lock.yaml ]]; then
                npm install -g pnpm
                pnpm install --frozen-lockfile
                pnpm test -- --coverage || true
              elif [[ -f yarn.lock ]]; then
                yarn install --frozen-lockfile
                yarn test --coverage || true
              else
                npm ci
                npm test -- --coverage || true
              fi
              if [[ ! -f coverage/coverage-summary.json ]]; then
                echo "::error::no coverage/coverage-summary.json produced. Configure your test runner to emit json-summary:"
                echo "::error::  vitest: add 'coverage: { reporter: [\"json-summary\"] }' to vite.config.ts"
                echo "::error::  jest:   add 'coverageReporters: [\"json-summary\"]' to jest.config.js"
                echo "::error::  also ensure a coverage provider is installed (vitest: @vitest/coverage-v8)"
                exit 1
              fi
              MEASURED=$(jq '.total.lines.pct' coverage/coverage-summary.json)
              ;;
          esac
          # Round to 1 decimal for stability across runs.
          MEASURED=$(awk -v m="$MEASURED" 'BEGIN {printf "%.1f", m}')
          echo "measured=$MEASURED" >> "$GITHUB_OUTPUT"
          echo "measured coverage: $MEASURED%"

      - name: Seed-not-yet on PR — pass-through with comment
        # Install PR ships current=0. Don't self-commit (would create a new
        # HEAD SHA that GITHUB_TOKEN can't re-trigger workflows on). Just
        # pass and let the install PR merge naturally. The push:main run
        # opens a follow-up seed PR with the real value.
        if: steps.floor.outputs.mode == 'seed' && github.event_name == 'pull_request'
        env:
          MEASURED: ${{ steps.measure.outputs.measured }}
        run: |
          echo "seed-not-yet on PR: measured $MEASURED%; PASS (will seed via post-merge follow-up PR)"

      - name: Seed-not-yet on main — open follow-up seed PR
        if: steps.floor.outputs.mode == 'seed' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          MEASURED: ${{ steps.measure.outputs.measured }}
          TARGET: ${{ steps.floor.outputs.target }}
          INPUT_FLOOR_FILE: ${{ inputs.floor_file || '.coverage-floor' }}
          SEED_MIN: ${{ inputs.seed_minimum || '1.0' }}
          # Use AUTOMERGE_PAT if forwarded by the caller; fall back to
          # GITHUB_TOKEN with a warning (recursion-prevention means seed
          # PR opened by GITHUB_TOKEN won't spawn pull_request workflows,
          # so the seed PR will sit "blocked" until a user pushes an
          # empty commit to its branch).
          AUTOMERGE_PAT: ${{ secrets.AUTOMERGE_PAT }}
        run: |
          set -euo pipefail
          # Loop-prevention guard: refuse to seed below seed_minimum.
          # Otherwise an install on a repo with broken test infra would
          # generate a 0% seed PR; here on main, we just no-op with a warning.
          if awk -v m="$MEASURED" -v t="$SEED_MIN" 'BEGIN {exit !(m < t)}'; then
            echo "::warning::measured coverage $MEASURED% < seed_minimum $SEED_MIN% on main — not opening seed PR. Investigate test infra OR manually edit .coverage-floor with the right value."
            exit 0
          fi
          PROPOSED=$(awk -v m="$MEASURED" 'BEGIN {x = m - 0.5; if (x < 0) x = 0; printf "%.1f", x}')
          TODAY=$(date -u +%Y-%m-%d)

          # Select the auth token. Prefer AUTOMERGE_PAT (the seed PR will
          # spawn pull_request workflows naturally); fall back to GITHUB_TOKEN
          # with a warning so the operator knows manual unblock is needed.
          if [[ -n "${AUTOMERGE_PAT:-}" ]]; then
            export GH_TOKEN="$AUTOMERGE_PAT"
            PUSH_URL="https://x-access-token:${AUTOMERGE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
            echo "==> Using AUTOMERGE_PAT for seed branch push + PR open (workflows will fire naturally)"
          else
            export GH_TOKEN="${{ github.token }}"
            PUSH_URL="origin"
            echo "::warning::AUTOMERGE_PAT secret not forwarded by caller. Falling back to GITHUB_TOKEN, which won't spawn pull_request workflows on the seed PR. The seed PR will be 'blocked' until someone pushes an empty commit to its branch. See callers/coverage-floor.yml in topcoder1/dotclaude for how to forward the secret."
          fi

          # Ensure the label exists (idempotent).
          gh label create coverage-floor-seed \
            --description "Auto-opened by coverage-floor.yml to seed the floor after install" \
            --color 0E8A16 2>/dev/null || true

          # Idempotency: if a seed PR is already open from this workflow, skip.
          if gh pr list --state open --label coverage-floor-seed --limit 1 --json number --jq '.[].number' | grep -q .; then
            echo "a coverage-floor-seed PR is already open — skipping"
            exit 0
          fi

          BRANCH="chore/coverage-floor-seed-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          jq --argjson c "$PROPOSED" --argjson t "$TARGET" --arg d "$TODAY" \
            '{current: $c, target: $t, last_bumped: $d}' "$INPUT_FLOOR_FILE" > "$INPUT_FLOOR_FILE.tmp"
          mv "$INPUT_FLOOR_FILE.tmp" "$INPUT_FLOOR_FILE"

          git add "$INPUT_FLOOR_FILE"
          git commit -m "chore(coverage): seed floor at ${PROPOSED}% (measured ${MEASURED}%)" \
            -m "Auto-seeded post-merge by coverage-floor.yml. After this PR merges, future PRs enforce this floor."
          git push -u "$PUSH_URL" "$BRANCH"

          # Open auto-mergeable PR. Single .coverage-floor file change is
          # safe-paths-automerge eligible per the central policy.
          PR_BODY=$(printf 'Post-merge seed of `.coverage-floor` after coverage-floor caller install. Measured coverage on main: %s%%. Floor seeded at %s%% (measured - 0.5%% buffer).\n\nAfter this merges, future PRs run `coverage-floor.yml` in enforce mode against this floor.\n\n🤖 Auto-opened by topcoder1/ci-workflows/.github/workflows/coverage-floor.yml' "$MEASURED" "$PROPOSED")
          gh pr create --title "chore(coverage): seed floor at ${PROPOSED}% (measured ${MEASURED}%)" \
            --body "$PR_BODY" \
            --label coverage-floor-seed 2>&1 | tail -1

      - name: Enforce mode — compare measured vs floor
        if: steps.floor.outputs.mode == 'enforce' && github.event_name == 'pull_request'
        env:
          MEASURED: ${{ steps.measure.outputs.measured }}
          FLOOR: ${{ steps.floor.outputs.current }}
        run: |
          set -euo pipefail
          if awk -v m="$MEASURED" -v f="$FLOOR" 'BEGIN {exit !(m >= f)}'; then
            echo "PASS: measured $MEASURED% >= floor $FLOOR%"
          else
            DROP=$(awk -v m="$MEASURED" -v f="$FLOOR" 'BEGIN {printf "%.1f", f - m}')
            echo "::error::FAIL: measured $MEASURED% < floor $FLOOR% (drop of $DROP%)"
            exit 1
          fi

      - name: Enforce mode on main — no-op (baseline tracking only)
        if: steps.floor.outputs.mode == 'enforce' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          MEASURED: ${{ steps.measure.outputs.measured }}
          FLOOR: ${{ steps.floor.outputs.current }}
        run: |
          echo "post-merge baseline: measured $MEASURED% vs floor $FLOOR% (no enforcement on main; PR gates handle regressions)"

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-floor
          message: |
            **Coverage Floor** — mode: `${{ steps.floor.outputs.mode }}`

            | metric | value |
            |---|---|
            | measured | `${{ steps.measure.outputs.measured }}%` |
            | floor (current) | `${{ steps.floor.outputs.current }}%` |
            | target | `${{ steps.floor.outputs.target }}%` |
            | last bumped | `${{ steps.floor.outputs.last_bumped }}` |

            ${{ steps.floor.outputs.mode == 'seed' && '_Seed-not-yet: floor==0 means coverage is not enforced yet. After this PR merges, the push:main run opens a follow-up PR `chore(coverage): seed floor at X.X%` to commit the real value. From then on, future PRs run in enforce mode._' || '' }}
