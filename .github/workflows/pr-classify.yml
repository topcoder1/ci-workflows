name: PR Risk Classifier (reusable)

# Reads .github/risk-paths.yml from the caller repo's checkout, classifies
# the PR's changed files, and exposes the highest-priority class as both a
# PR label and a job output for downstream workflows to gate on.
#
# Priority (high → low):
#   blocked > sensitive > standard > safe_test > safe_deps > safe_config > trivial
#
# Caller wires this in via `uses:` and consumes `outputs.risk_class`.
# See impl plan §4 for the design rationale.
#
# Resilience: every gh call that gates the job is wrapped in `retry` (3
# attempts, 5s/10s backoff). GitHub's API sporadically rejects valid tokens —
# the 2026-06-10 "erroneous 401 responses" incident hit ~15% of API traffic
# and turned this check red fleet-wide. Retries turn a 15% per-call blip
# into ~0.3%.
#
# skip_label: when one repo wires this reusable into two workflows (the
# standalone PR Classify caller AND the embedded classify job in
# pr-codex-review.yml), both race to write the same label and sticky
# comment. The embedded copy only needs the risk_class OUTPUT — it should
# pass `skip_label: true` and leave the writes to the standalone caller.

on:
  workflow_call:
    inputs:
      skip_label:
        description: "Compute and output risk_class only — skip the risk:* label write and the blocked-PR sticky comment. Set when another workflow in the repo (the standalone PR Classify caller) already owns those writes."
        type: boolean
        required: false
        default: false
    outputs:
      risk_class:
        description: "Highest risk class for this PR (blocked|sensitive|standard|safe_test|safe_deps|safe_config|trivial)"
        value: ${{ jobs.classify.outputs.class }}

jobs:
  classify:
    name: Classify PR Risk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      class: ${{ steps.compute.outputs.class }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v7

      - name: Verify risk-paths.yml exists
        run: |
          if [ ! -f .github/risk-paths.yml ]; then
            echo "::error::.github/risk-paths.yml is missing — every repo using pr-classify.yml MUST have one. See: https://github.com/topcoder1/ci-workflows/blob/main/README.md#pr-classifier"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Fetch classifier script from this reusable's repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          retry() { local i out; for i in 1 2 3; do if out=$("$@"); then printf '%s' "$out"; return 0; fi; [ "$i" -lt 3 ] && sleep $((i * 5)); done; return 1; }
          # The caller checked out THEIR repo. We need our classify.mjs script,
          # which lives in topcoder1/ci-workflows. Pull it via the GitHub API
          # so we don't pollute the caller's working tree.
          mkdir -p .github/scripts
          fetch() {
            gh api repos/topcoder1/ci-workflows/contents/.github/scripts/classify.mjs \
              --jq '.content' | base64 -d > .github/scripts/classify.mjs
          }
          retry fetch

      - name: Install classifier deps
        run: npm install --no-save yaml@2 minimatch@10

      - name: Compute highest-priority class
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          retry() { local i out; for i in 1 2 3; do if out=$("$@"); then printf '%s' "$out"; return 0; fi; [ "$i" -lt 3 ] && sleep $((i * 5)); done; return 1; }
          # Changed-file names via the paginated files API — `gh pr diff
          # --name-only` HTTP-406s on diffs >20k lines (dotclaude#121).
          changed=$(retry gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}/files?per_page=100" \
            --paginate --jq '.[].filename')
          # The listing endpoint caps at 3000 files. A truncated list can
          # compute a falsely benign class, and the risk:* label is still a
          # gating input for claude-author-automerge.yml (belt-and-suspenders
          # beside its own direct risk-paths read) — so stay red.
          if [ "$(printf '%s\n' "$changed" | sed '/^$/d' | wc -l)" -ge 3000 ]; then
            echo "::error::PR changes 3000+ files — file listing is truncated, cannot classify. Merge manually."
            exit 1
          fi
          class=$(echo "$changed" | node .github/scripts/classify.mjs)
          echo "class=$class" >> "$GITHUB_OUTPUT"
          echo "Computed risk class: $class"
          echo "Changed files:"
          # shellcheck disable=SC2001 # multiline indent — sed is clearer than ${var//.../...}
          echo "$changed" | sed 's/^/  /'

      - name: Set risk label on PR
        if: ${{ !inputs.skip_label }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          CLASS: ${{ steps.compute.outputs.class }}
        run: |
          retry() { local i out; for i in 1 2 3; do if out=$("$@"); then printf '%s' "$out"; return 0; fi; [ "$i" -lt 3 ] && sleep $((i * 5)); done; return 1; }
          # Remove any existing risk:* labels, add the current one.
          existing=$(retry gh pr view "$PR" --json labels --jq '.labels[].name' | grep '^risk:' || true)
          for L in $existing; do
            if [ "$L" != "risk:$CLASS" ]; then
              gh pr edit "$PR" --remove-label "$L" 2>/dev/null || true
            fi
          done
          # Create the label if it doesn't exist (idempotent — gh ignores conflict).
          gh label create "risk:$CLASS" --color "ededed" --description "Risk class: $CLASS" 2>/dev/null || true
          # The label still gates: claude-author-automerge.yml honors it as a
          # belt-and-suspenders signal beside the direct risk-paths.yml read
          # it performs itself (the label alone was a TOCTOU race — GITHUB_TOKEN
          # label writes never retrigger workflows; wxa-secrets#27). It is also
          # the primary signal for humans and BB-side tooling, so a persistent
          # failure here must stay red — transient API blips get retried first.
          retry gh pr edit "$PR" --add-label "risk:$CLASS"

      - name: Annotate `blocked` class (manual-merge required)
        if: ${{ !inputs.skip_label && steps.compute.outputs.class == 'blocked' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          retry() { local i out; for i in 1 2 3; do if out=$("$@"); then printf '%s' "$out"; return 0; fi; [ "$i" -lt 3 ] && sleep $((i * 5)); done; return 1; }
          # IMPORTANT: this step does NOT exit non-zero. The reusable's job
          # is to *classify*, not to gate. Auto-merge gating happens in
          # claude-author-automerge.yml, which classifies the PR against the
          # base branch's risk-paths.yml itself (plus the `risk:*` label and
          # its global risk-tier regex) and refuses to enable auto-merge. Failing
          # the classify check here would (a) only add visual red without
          # blocking merge (since required-status-checks rulesets in caller
          # repos typically don't list this check), and (b) confuse "code
          # is broken" with "policy says manual merge". Keep them separate.
          # For the same reason, gh failures below are downgraded to
          # ::warning:: — a lost sticky comment must not redden the check
          # (it did on 2026-06-10 when GitHub served erroneous 401s).
          echo "::warning::PR touches blocked paths (Dockerfile, compose, workflows, secrets, classifier itself). Manual merge by a maintainer is expected; auto-merge will be refused by claude-author-automerge.yml."

          # Sticky comment so the reason is visible inline on the PR (the
          # ::warning:: only shows in the Actions log).
          marker="<!-- pr-classify:blocked -->"
          existing=$(retry gh api "/repos/$REPO/issues/$PR/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | first // empty" || true)
          body=$(printf '%s\n' \
            "$marker" \
            "**Risk class: \`blocked\` — manual merge required.**" \
            "" \
            "This PR touches one of the blocked path categories from \`.github/risk-paths.yml\` (Dockerfiles, docker-compose, \`.github/workflows/**\`, \`**/.env*\`, \`**/secrets*\`, \`infra/\`, \`terraform/\`, \`k8s/\`, or the classifier config itself)." \
            "" \
            "Auto-merge is refused by \`claude-author-automerge.yml\`. A maintainer should review the diff and click \"Squash and merge\" themselves." \
            "" \
            "(This is a policy notice, not a code-quality failure. The classify job itself does not fail — required CI checks remain authoritative for \"is the code green.\")")
          if [ -n "$existing" ]; then
            retry gh api -X PATCH "/repos/$REPO/issues/comments/$existing" -f body="$body" >/dev/null \
              || echo "::warning::could not update the blocked-class sticky comment (API failure; non-fatal — label and automerge gating are unaffected)"
          else
            retry gh pr comment "$PR" --body "$body" \
              || echo "::warning::could not post the blocked-class sticky comment (API failure; non-fatal — label and automerge gating are unaffected)"
          fi
