name: Tests

# Two roles for this workflow:
#
# 1. Self-test: triggers on pull_request + push to main of *this repo* so that
#    typos in the reusable here get caught before they break every consumer.
#    Self-test fixtures live in `selftest/` (NOT `tests/`, to make it clear
#    they're verifying the reusable itself, not production tests).
#
# 2. Reusable: other repos call it via
#       jobs:
#         tests:
#           uses: topcoder1/ci-workflows/.github/workflows/tests-runner.yml@main
#    See callers/tests-runner.yml in the templates dir for a copy-paste-ready
#    caller.
#
# What it does:
#   - Auto-detects language from manifest files (pyproject.toml / requirements.txt
#     → python; go.mod → go; package.json → js). Override via `language:` input.
#   - Multi-language repos: auto-detection aborts; caller must pass `language:`
#     and `working_directory:` explicitly. See the multi-lang notes in the
#     installer docs.
#   - Installs deps and runs the test command appropriate for that language.
#     `test_command:` input lets the caller override the default invocation
#     (e.g. `bun run test:unit` instead of `npm test`).
#
# Defaults chosen for "drop into an existing repo and surface its current
# test suite":
#   - Python with pyproject.toml → `uv sync && uv run --no-sync pytest -q`
#     (uv is the fastest sustainable choice and handles lockfiles; --no-sync
#     because the test invocation runs after the scoped git credential is
#     scrubbed and must never re-resolve deps).
#   - Python with only requirements.txt → `pip install -r requirements.txt
#     && pip install pytest && pytest -q`. No coverage gating here; that's
#     coverage-floor.yml's job.
#   - Go → `go test ./...`
#   - JS → respects lockfile to pick runner (bun.lockb → bun; pnpm-lock.yaml
#     → pnpm; yarn.lock → yarn; else npm), then `<runner> test`. Override via
#     `test_command:` for repos with non-standard script names.
#
# Coverage gating is a separate concern: see coverage-floor.yml.
# Regression-test convention enforcement: see regression-convention.yml.
# Interactive/TTY behavioral tests: see tty-tests.yml.

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      language:
        description: "Language: auto | python | go | js. Default auto. Multi-language repos MUST pass explicitly (auto-detect aborts on ambiguity)."
        required: false
        type: string
        default: "auto"
      working_directory:
        description: "Directory containing the manifest file (pyproject.toml / requirements.txt / go.mod / package.json). Default '.'. Use for monorepo subdirs like 'web' or 'backend'."
        required: false
        type: string
        default: "."
      test_command:
        description: "Override the default test invocation. Empty = use language default. E.g. 'bun run test:unit' or 'pytest tests/unit -q'."
        required: false
        type: string
        default: ""
      python_version:
        description: "Python version when language=python. Default '3.13'."
        required: false
        type: string
        default: "3.13"
      node_version:
        description: "Node version when language=js. Default '20'."
        required: false
        type: string
        default: "20"
      go_version:
        description: "Go version when language=go. Default reads from go.mod's `go` directive, fallback '1.23'."
        required: false
        type: string
        default: ""
      use_pat_for_git_deps:
        description: "Materialize the git-deps credential (GIT_DEPS_PAT, falling back to AUTOMERGE_PAT) on pull_request runs so `uv sync` can clone private/cross-org git-URL dependencies. Default false: PR runs execute PR-controlled code during dependency install, so a readable credential there is exfiltratable (caught 2026-07-16 via wxa-secrets#28 codex review). Set true ONLY on repos that genuinely have git-URL deps (e.g. wxa_sanctions -> wxa-secrets). Only a push to the default branch (already-reviewed code) materializes the credential without this input; schedule / workflow_dispatch / branch-push runs need it too. NOTE the honest boundary: the real fleet protection is the DEFAULT of forwarding nothing — non-opted-in repos never expose the credential on a PR. Opting in accepts a residual install-phase window: PR-controlled code that `uv sync` runs (package build hooks, or whatever a poisoned lockfile pulls in) executes while the credential is present and CAN read it; only the post-install test phase is protected by the pre-test scrub (exception: a caller `test_command` runs install and tests as one command before the scrub, so the credential is present during those tests too). This input is also NOT a defense against actors with push access — they can edit the caller or add a workflow and read any repo-visible secret (GitHub's same-repo pull_request baseline; fork PRs get no secrets). Allowlist gating + preferring the least-privilege GIT_DEPS_PAT bound the blast radius."
        required: false
        type: boolean
        default: false
    secrets:
      GIT_DEPS_PAT:
        description: "Preferred, least-privilege git-deps credential: a fine-grained READ-ONLY PAT scoped to just the dependency repos (e.g. whois-api-llc/wxa-secrets, topcoder1/webcrawl). When forwarded, it is used for the insteadOf rewrite INSTEAD of AUTOMERGE_PAT, so theft during the residual dependency-resolution window yields read access to those few repos — not the fleet-wide automerge credential. Same materialization rules as AUTOMERGE_PAT (push:main whenever forwarded; pull_request only with use_pat_for_git_deps: true)."
        required: false
      AUTOMERGE_PAT:
        description: "Fallback git-deps credential (cross-org `repo` scope, deployed fleet-wide). Used for git-URL dependency clones during install only when GIT_DEPS_PAT is not forwarded. Forward it ONLY when the repo has private/cross-org git-URL deps, and pair it with `use_pat_for_git_deps: true` so pull_request runs can use it (push:main runs use it whenever forwarded). Repos without git-URL deps must not forward this secret. Prefer provisioning GIT_DEPS_PAT instead. Absence falls back to GITHUB_TOKEN with a warning."
        required: false

permissions:
  contents: read

jobs:
  detect:
    name: Detect language and runner
    runs-on: ubuntu-latest
    outputs:
      language: ${{ steps.d.outputs.language }}
      runner: ${{ steps.d.outputs.runner }}
      go_version: ${{ steps.d.outputs.go_version }}
    steps:
      - uses: actions/checkout@v7
      - id: d
        env:
          # `inputs.X` is empty on pull_request/push triggers (only populated
          # under workflow_call). Fall back to defaults explicitly so the
          # self-test on this repo behaves identically to a caller invocation.
          INPUT_LANGUAGE: ${{ inputs.language || 'auto' }}
          INPUT_WORKDIR: ${{ inputs.working_directory || '.' }}
          INPUT_GO_VERSION: ${{ inputs.go_version || '' }}
        run: |
          set -euo pipefail
          cd "$INPUT_WORKDIR"

          # Auto-detection enumerates ALL signals (not first-match) so we can
          # fail loudly on multi-language repos rather than silently picking
          # the wrong one (see techrecon: go.mod root + web/package.json).
          if [[ "$INPUT_LANGUAGE" == "auto" ]]; then
            found=()
            { [[ -f pyproject.toml ]] || [[ -f requirements.txt ]]; } && found+=("python")
            [[ -f go.mod ]] && found+=("go")
            [[ -f package.json ]] && found+=("js")
            if [[ ${#found[@]} -eq 0 ]]; then
              echo "::error::no language manifest in '$INPUT_WORKDIR' (pyproject.toml / requirements.txt / go.mod / package.json). Pass `language:` explicitly, or set `working_directory:` to the correct subdir."
              exit 1
            elif [[ ${#found[@]} -gt 1 ]]; then
              echo "::error::ambiguous language detection in '$INPUT_WORKDIR' — found: ${found[*]}. Pass `language:` and `working_directory:` explicitly. Multi-language repos need one caller per language."
              exit 1
            fi
            LANG="${found[0]}"
          else
            LANG="$INPUT_LANGUAGE"
          fi
          echo "language=$LANG" >> "$GITHUB_OUTPUT"

          # JS runner detection by lockfile.
          RUNNER=""
          if [[ "$LANG" == "js" ]]; then
            if [[ -f bun.lockb ]] || [[ -f bun.lock ]]; then RUNNER="bun";
            elif [[ -f pnpm-lock.yaml ]]; then RUNNER="pnpm";
            elif [[ -f yarn.lock ]]; then RUNNER="yarn";
            else RUNNER="npm"; fi
          fi
          echo "runner=$RUNNER" >> "$GITHUB_OUTPUT"

          # Go version: prefer input, else read go.mod's `go N.NN` directive,
          # else fall back to 1.23.
          GO_VER="$INPUT_GO_VERSION"
          if [[ "$LANG" == "go" && -z "$GO_VER" && -f go.mod ]]; then
            GO_VER=$(awk '/^go [0-9]+\.[0-9]+/ {print $2; exit}' go.mod || true)
          fi
          [[ -z "$GO_VER" ]] && GO_VER="1.23"
          echo "go_version=$GO_VER" >> "$GITHUB_OUTPUT"

          echo "detected: language=$LANG runner=$RUNNER go_version=$GO_VER workdir=$INPUT_WORKDIR"

  run-python:
    name: Tests (Python)
    needs: detect
    if: needs.detect.outputs.language == 'python'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ inputs.python_version || '3.13' }}
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Configure scoped git credential for cross-org clones
        # `uv sync` invokes `git clone` for git-URL dependencies (e.g.
        # `webcrawl @ git+https://github.com/topcoder1/webcrawl.git`). The
        # checkout step authenticated git with `github.token`, which is
        # scoped to the calling repo only — cross-org (and same-org private)
        # clones 404 without a real credential. Mirrors coverage-floor.yml's
        # same step.
        #
        # SECURITY MODEL (2026-07-16, wxa-secrets#28 codex review): this job
        # executes PR-controlled code on pull_request events (uv sync build
        # hooks, pytest), so the PAT is handled as follows:
        #   - Never written to global git config (the previous global
        #     insteadOf rewrite was readable by test code via
        #     `git config --get-regexp --global url`). It goes into a
        #     throwaway config file under $RUNNER_TEMP, exposed to the
        #     install step via GIT_CONFIG_GLOBAL, deleted before the default
        #     test invocation runs. (A caller `test_command` runs install +
        #     tests as one command, so the credential persists through it —
        #     that config accepts the wider window; see the install step.)
        #   - On pull_request runs it is materialized ONLY when the caller
        #     sets `use_pat_for_git_deps: true`. Honest boundary (codex,
        #     2026-07-16): the real fleet protection is the DEFAULT of
        #     forwarding nothing — non-opted-in repos never expose the
        #     credential on a PR. Opting in accepts a residual install-phase
        #     window: PR-controlled code that `uv sync` runs (package build
        #     hooks, or whatever a poisoned lockfile pulls in) executes
        #     while the credential is present and CAN read it; only the
        #     post-install test phase is protected by the scrub below.
        #     The input is also NOT a boundary against push-access actors —
        #     they can edit the caller or add any workflow and read any
        #     repo-visible secret (GitHub's same-repo pull_request baseline;
        #     fork PRs get no secrets). Repos without git-URL deps should
        #     not forward the secret at all.
        #   - Only a push to the default branch runs already-reviewed code,
        #     so only that event materializes the credential without the
        #     input. Every other event — branch pushes, schedule,
        #     workflow_dispatch — is treated like a PR and needs the input.
        #   - Least privilege: when the caller forwards GIT_DEPS_PAT (fine-
        #     grained read-only PAT scoped to just the dep repos), it wins
        #     over AUTOMERGE_PAT, so theft in the residual window yields
        #     read-only access to a couple of repos rather than the fleet
        #     automerge credential.
        # Rewrites are limited to the two fleet orgs, topcoder1 and
        # whois-api-llc, so the PAT never applies to clones of third-party
        # orgs.
        #
        # Burn 2026-05-13 -> 2026-07-06: wxa_sanctions' tests/coverage-floor
        # lanes were red since install because github.token is repo-scoped,
        # so even a same-org private git dep (whois-api-llc/wxa_sanctions ->
        # whois-api-llc/wxa-secrets) 404s without this rewrite.
        env:
          # Allowlist, not denylist (codex round-2 P1): auto-trust ONLY a
          # push to the default branch — schedule / workflow_dispatch /
          # feature-branch pushes run unreviewed code and need the explicit
          # input just like PRs. "Not a PR" is not the same as "trusted".
          CROSS_ORG_PAT: ${{ ((github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) || inputs.use_pat_for_git_deps) && (secrets.GIT_DEPS_PAT || secrets.AUTOMERGE_PAT) || '' }}
          PAT_FORWARDED: ${{ secrets.GIT_DEPS_PAT != '' || secrets.AUTOMERGE_PAT != '' }}
        run: |
          set -euo pipefail
          CROSS_ORG_GITCONFIG="$RUNNER_TEMP/cross-org-gitconfig"
          if [[ -n "${CROSS_ORG_PAT:-}" ]]; then
            git config --file "$CROSS_ORG_GITCONFIG" \
              url."https://x-access-token:${CROSS_ORG_PAT}@github.com/topcoder1/".insteadOf \
              "https://github.com/topcoder1/"
            git config --file "$CROSS_ORG_GITCONFIG" \
              url."https://x-access-token:${CROSS_ORG_PAT}@github.com/whois-api-llc/".insteadOf \
              "https://github.com/whois-api-llc/"
            echo "==> Wrote scoped insteadOf config for topcoder1/* and whois-api-llc/* (scrubbed before the default test run)"
          elif [[ "$PAT_FORWARDED" == "true" ]]; then
            echo "::notice::AUTOMERGE_PAT is forwarded but not materialized on pull_request runs unless the caller sets use_pat_for_git_deps: true. Repos with private git-URL deps need that input; repos without them should stop forwarding the secret."
          else
            echo "::warning::AUTOMERGE_PAT not forwarded by caller. Private/cross-org git-URL dependencies will fail with 404 on uv sync."
          fi
      - name: Install deps and run tests
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          INPUT_TEST_COMMAND: ${{ inputs.test_command || '' }}
        run: |
          set -euo pipefail
          # Scoped credential (if the previous step wrote one) is exposed to
          # dependency installation ONLY, then deleted before the DEFAULT
          # test invocation — which executes PR-controlled code and must not
          # be able to read it. (A caller test_command runs install+tests as
          # one command, so it is scrubbed only afterward; that branch
          # accepts the wider window.) GIT_CONFIG_GLOBAL redirects git's
          # "global" config lookup to the throwaway file; unsetting it
          # restores the default (credential-free) global config after.
          CROSS_ORG_GITCONFIG="$RUNNER_TEMP/cross-org-gitconfig"
          if [[ -f "$CROSS_ORG_GITCONFIG" ]]; then
            export GIT_CONFIG_GLOBAL="$CROSS_ORG_GITCONFIG"
          fi
          if [[ -n "$INPUT_TEST_COMMAND" ]]; then
            # test_command installs and tests in one opaque command, so the
            # credential (when materialized) stays available throughout it.
            # Repos combining test_command with use_pat_for_git_deps accept
            # that wider window.
            echo "Running override: $INPUT_TEST_COMMAND"
            eval "$INPUT_TEST_COMMAND"
            rm -f "$CROSS_ORG_GITCONFIG"; unset GIT_CONFIG_GLOBAL
          elif [[ -f pyproject.toml ]]; then
            # --all-extras matches coverage-floor.yml — install every
            # [project.optional-dependencies] extra so test deps in old-style
            # extras blocks get picked up alongside [dependency-groups].
            uv sync --all-extras
            # Some repos have pyproject.toml as config-only with deps in
            # requirements.txt (inbox_superpilot/backend pattern). Install
            # those on top so the test invocation below finds them.
            [[ -f requirements.txt ]]     && uv pip install -r requirements.txt
            [[ -f requirements-dev.txt ]] && uv pip install -r requirements-dev.txt
            rm -f "$CROSS_ORG_GITCONFIG"; unset GIT_CONFIG_GLOBAL
            # --no-sync: the env was fully synced above; the test invocation
            # must never trigger a re-resolve (it would need the already-
            # deleted credential, and silently re-fetching during tests is
            # exactly the exposure this layout removes).
            uv run --no-sync pytest -q
          elif [[ -f requirements.txt ]]; then
            python -m venv .venv
            .venv/bin/pip install -q -r requirements.txt
            .venv/bin/pip install -q pytest
            rm -f "$CROSS_ORG_GITCONFIG"; unset GIT_CONFIG_GLOBAL
            .venv/bin/pytest -q
          else
            echo "::error::python language declared but no pyproject.toml or requirements.txt found"
            exit 1
          fi

  run-go:
    name: Tests (Go)
    needs: detect
    if: needs.detect.outputs.language == 'go'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.detect.outputs.go_version }}
      - name: Run tests
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          INPUT_TEST_COMMAND: ${{ inputs.test_command || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_TEST_COMMAND" ]]; then
            echo "Running override: $INPUT_TEST_COMMAND"
            eval "$INPUT_TEST_COMMAND"
          else
            go test ./...
          fi

  run-js:
    name: Tests (JS)
    needs: detect
    if: needs.detect.outputs.language == 'js'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || '20' }}
      - name: Install runner (bun/pnpm) if needed
        if: needs.detect.outputs.runner == 'bun' || needs.detect.outputs.runner == 'pnpm'
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.runner }}" == "bun" ]]; then
            curl -fsSL https://bun.sh/install | bash
            echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          else
            npm install -g pnpm
          fi
      - name: Install deps and run tests
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          INPUT_TEST_COMMAND: ${{ inputs.test_command || '' }}
          RUNNER: ${{ needs.detect.outputs.runner }}
        run: |
          set -euo pipefail
          case "$RUNNER" in
            bun)   bun install --frozen-lockfile ;;
            pnpm)  pnpm install --frozen-lockfile ;;
            yarn)  yarn install --frozen-lockfile ;;
            npm)   npm ci ;;
          esac
          if [[ -n "$INPUT_TEST_COMMAND" ]]; then
            echo "Running override: $INPUT_TEST_COMMAND"
            eval "$INPUT_TEST_COMMAND"
          else
            "$RUNNER" test
          fi
