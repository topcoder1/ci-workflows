name: Claude PR Review (reusable)

# Reusable workflow. Lives in a central repo (e.g. topcoder1/ci-workflows).
# Per-project caller invokes this via `uses:` and passes inputs.

on:
  workflow_call:
    inputs:
      review_focus:
        description: "Project-specific review focus (appended to the base prompt). Optional."
        required: false
        type: string
        default: ""
      checkout_depth:
        description: "git fetch-depth. 0 = full history (needed for diff against base)."
        required: false
        type: number
        default: 0
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write  # action posts inline comments
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.checkout_depth }}

      # Skip claude-code-action for bot-authored PRs (dependabot, renovate).
      # The action's @v1 currently crashes with "directory mismatch ...
      # tsconfig.json, fd 4" on dependabot's restricted GITHUB_TOKEN scope —
      # verified across 3 consecutive dependabot PRs (topcoder1/ci-workflows
      # #7/#8/#9). Even when the action does run, dependency bumps don't
      # benefit from Claude review (the diff is upstream version metadata,
      # not project logic). The risk classifier still labels these PRs.
      #
      # We post a "Skipped" summary comment so the required check is satisfied
      # green — branch rulesets that require `review / Claude Review` would
      # otherwise treat a skipped job as failing.
      - name: Skip review for bot-authored PRs (dependabot/renovate)
        id: bot_check
        if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'renovate[bot]' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          ACTOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          gh pr comment "$PR" --body "Skipped: bot-authored PR (\`$ACTOR\`). Dependency bumps are reviewed by the risk classifier and human merge gate."
          echo "skipped=true" >> "$GITHUB_OUTPUT"

      # Pre-install the Claude Code native binary explicitly. Workaround for
      # anthropics/claude-code-action#1290 (opened 2026-05-06): upstream
      # `claude install` started exiting 0 even when /home/runner/.local/bin
      # didn't exist, leaving no binary at the path the action then tries to
      # spawn. Symptom: "Claude Code native binary not found at
      # /home/runner/.local/bin/claude" / "Internal error: directory mismatch
      # for directory .../tsconfig.json, fd 4". Verified breaking the entire
      # fleet's PR Review check 2026-05-06 06:59 UTC across multiple repos.
      #
      # The fix here: pre-create the directory, run the installer ourselves,
      # and HARD-VERIFY the binary exists before handing off to the action.
      # This makes the failure load-bearing instead of silent. Remove this
      # step once anthropics/claude-code-action#1290 ships a fix.
      - name: Pre-install Claude Code binary (workaround anthropics/claude-code-action#1290)
        if: ${{ steps.bot_check.outputs.skipped != 'true' }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          # install.sh intermittently exits 0 WITHOUT placing the binary (#1290),
          # which used to fail the whole review job on a coin-flip. Retry up to
          # 3 times, then fall back to npm, before giving up.
          for attempt in 1 2 3; do
            curl -fsSL https://claude.ai/install.sh | bash || true
            [ -x "$HOME/.local/bin/claude" ] && break
            echo "::warning::Claude install attempt ${attempt}/3 produced no binary; retrying..."
            sleep $((attempt * 5))
          done
          if [ ! -x "$HOME/.local/bin/claude" ]; then
            echo "::warning::install.sh failed 3× — falling back to npm (@anthropic-ai/claude-code)"
            npm install -g @anthropic-ai/claude-code || true
            if command -v claude >/dev/null 2>&1 && [ ! -x "$HOME/.local/bin/claude" ]; then
              ln -sf "$(command -v claude)" "$HOME/.local/bin/claude"
            fi
          fi
          if [ ! -x "$HOME/.local/bin/claude" ]; then
            echo "::error::Claude Code binary not at $HOME/.local/bin/claude after 3 install attempts + npm fallback — check upstream issue #1290"
            exit 1
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/claude" --version

      - name: Claude Code Review
        if: ${{ steps.bot_check.outputs.skipped != 'true' }}
        # Pinned to v1.0.112 (2026-05-04) — v1.0.113/.114 (2026-05-06) ship a
        # regression where the action's setup step fails to install the Claude
        # Code native binary, causing every Claude Review across the fleet to
        # fail with "Claude Code native binary not found". See ci-workflows#37.
        # Restore to @v1 (or a fresh SHA) once upstream ships a fix.
        uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c # v1.0.175
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Allow bot-initiated PRs (dependabot, renovate). Without this the
          # action rejects all bot actors, turning this required check into a
          # permanent block on every dep-bump PR.
          allowed_bots: "dependabot,renovate"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR's diff against the base branch. Focus on:
            - Logic bugs, off-by-one, null/undefined handling
            - SQL safety, auth/permission boundaries, secret leakage
            - LLM trust-boundary violations (untrusted text routed as instructions)
            - Conditional side effects, race conditions, error swallowing
            - Missing test coverage for new branches
            - Backwards-compat breaks

            Skip nits, style, and "consider"-grade suggestions. Use inline comments
            (mcp__github_inline_comment__create_inline_comment) only for issues
            you're 80%+ sure are real bugs.

            ALWAYS finish by posting a top-level summary comment via:
              gh pr comment <PR_NUMBER> --body "..."
            One short line. Examples:
              - "No issues found. Diff is small and contained."
              - "Flagged 2 issues inline — see comments."
              - "Skipped: changes are docs-only / out of review scope."
            This summary confirms the review ran even when nothing was flagged.

            ${{ inputs.review_focus }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
