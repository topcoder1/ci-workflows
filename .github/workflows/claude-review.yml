name: Claude PR Review (reusable)

# Reusable workflow. Lives in a central repo (e.g. topcoder1/ci-workflows).
# Per-project caller invokes this via `uses:` and passes inputs.

on:
  workflow_call:
    inputs:
      review_focus:
        description: "Project-specific review focus (appended to the base prompt). Optional."
        required: false
        type: string
        default: ""
      checkout_depth:
        description: "git fetch-depth. 0 = full history (needed for diff against base)."
        required: false
        type: number
        default: 0
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write  # action posts inline comments
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.checkout_depth }}

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Allow bot-initiated PRs (dependabot, renovate). Without this the
          # action rejects all bot actors, turning this required check into a
          # permanent block on every dep-bump PR.
          allowed_bots: "dependabot,renovate"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR's diff against the base branch. Focus on:
            - Logic bugs, off-by-one, null/undefined handling
            - SQL safety, auth/permission boundaries, secret leakage
            - LLM trust-boundary violations (untrusted text routed as instructions)
            - Conditional side effects, race conditions, error swallowing
            - Missing test coverage for new branches
            - Backwards-compat breaks

            Skip nits, style, and "consider"-grade suggestions. Use inline comments
            (mcp__github_inline_comment__create_inline_comment) only for issues
            you're 80%+ sure are real bugs.

            ALWAYS finish by posting a top-level summary comment via:
              gh pr comment <PR_NUMBER> --body "..."
            One short line. Examples:
              - "No issues found. Diff is small and contained."
              - "Flagged 2 issues inline — see comments."
              - "Skipped: changes are docs-only / out of review scope."
            This summary confirms the review ran even when nothing was flagged.

            ${{ inputs.review_focus }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
