name: PR Codex Review

# OpenAI Codex CLI as a third-party reviewer for vendor diversity.
# Runs ONLY on risk:sensitive PRs (per .github/risk-paths.yml). Pairs with
# Claude Review (which runs on every PR via pr-review.yml) to give
# independent-model coverage on high-impact code paths.

on:
  pull_request:
    types: [opened, synchronize]
    # Skip the entire Codex track on bootstrap-paths. The classifier flags
    # these as risk:blocked and exits 1, which would surface as a failing
    # `PR Codex Review / classify` check + a cascading-skipped review job.
    # Both are noise — bootstrap-path PRs always require admin merge by
    # design, so a secondary review adds no signal.
    #
    # SAFETY: Codex review is NOT in the required-checks ruleset on
    # ci-workflows main (verified: only `review / Claude Review` is
    # required), so paths-ignore here does NOT create a deadlock. If you
    # add this check to a ruleset later, drop these excludes.
    paths-ignore:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".github/risk-paths.yml"
      - ".github/CODEOWNERS"
      - "Dockerfile"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify:
    if: github.event.pull_request.draft == false
    uses: topcoder1/ci-workflows/.github/workflows/pr-classify.yml@main

  review:
    needs: classify
    if: needs.classify.outputs.risk_class == 'sensitive'
    uses: topcoder1/ci-workflows/.github/workflows/codex-review.yml@main
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
